function viewMyReports(){
  var month=repMonthNow();   // view-local state; chevrons reload the same view
  var accountantId="";       // "" = all accountants; persists across month prev/next
  var accountants=null;      // [{id,name}] once loaded; null until first fetch resolves
  function monthPicker(){
    return el("div",{class:"card app-card rep-month"},[
      el("button",{class:"rep-chev",text:"‹",title:"الشهر السابق",onclick:function(){ month=repMonthShift(month,-1); load(); }}),
      el("div",{class:"rep-month-lbl",text:month}),
      el("button",{class:"rep-chev",text:"›",title:"الشهر التالي",onclick:function(){ month=repMonthShift(month,1); load(); }})
    ]);
  }
  // Accountant scope filter: "كل المحاسبين" + one option per accountant.
  function accountantFilter(){
    var opts=[el("option",{value:"",selected:(accountantId==="")?"":false,text:"كل المحاسبين"})];
    (accountants||[]).forEach(function(a){
      opts.push(el("option",{value:a.id,selected:(String(a.id)===String(accountantId))?"":false,text:a.name}));
    });
    var sel=el("select",{class:"rep-acc-select",onchange:function(){ accountantId=this.value; load(); }},opts);
    return el("div",{class:"card app-card rep-acc"},[
      el("span",{class:"rep-acc-ic"},[mi("badge")]),
      el("span",{class:"rep-acc-lbl",text:"المحاسب"}),
      sel
    ]);
  }
  function paint(inner){
    var content=el("div");
    content.appendChild(el("div",{class:"app-section-title",text:"التقارير الشهرية"}));
    content.appendChild(monthPicker());
    // Branch is controlled globally by the owner-shell switcher (ownerBranch).
    content.appendChild(accountantFilter());
    content.appendChild(inner);
    shell("#/my/reports",content);
  }
  // Fetch the owner's accountants once for the dropdown; failures leave the
  // filter as "all" only (the report itself still loads).
  function ensureAccountants(){
    if(accountants!==null) return Promise.resolve(accountants);
    return acctData("accountants",{page:1,limit:200}).then(function(res){
      accountants=normalizeList(res,"records").map(function(r){
        var d=(r&&r.data)||{};
        return {id:d.id,name:(r&&r.label)||d.name||d.username||String(d.id||"")};
      }).filter(function(a){ return a.id!=null && a.id!==""; });
      return accountants;
    }).catch(function(){ accountants=[]; return accountants; });
  }
  function load(){
    var reqMonth=month, reqAcc=accountantId, reqBranch=ownerBranch.id+"|"+acctBranch.id;
    paint(loadingBlock("جارٍ تحميل تقرير "+reqMonth+"…"));
    Promise.all([acctStats(reqMonth,reqAcc),ensureAccountants()]).then(function(both){
      if(reqMonth!==month||reqAcc!==accountantId||reqBranch!==(ownerBranch.id+"|"+acctBranch.id)) return;   // stale after a switch
      var mainStats=both[0];
      var accts=both[1]||[];
      // v14 (item 3): also fetch each accountant's OWN stats for the per-accountant
      // breakdown (best-effort; a failed one renders blank, the report still shows).
      return Promise.all(accts.map(function(a){
        return acctStats(reqMonth,a.id)
          .then(function(s){ return {acct:a,dash:(s&&s.dashboard)||null}; })
          .catch(function(){ return {acct:a,dash:null}; });
      })).then(function(perAcct){
        if(reqMonth!==month||reqAcc!==accountantId||reqBranch!==(ownerBranch.id+"|"+acctBranch.id)) return; // stale
        paint(reportBody(mainStats,perAcct));
      });
    }).catch(function(err){
      if(err.status===401) return;
      if(reqMonth!==month||reqAcc!==accountantId||reqBranch!==(ownerBranch.id+"|"+acctBranch.id)) return;
      if(isFeatureDisabled(err)){ shell("#/my/reports",ownerFeatureBlock()); return; }
      paint(errorBlock(err,load));
    });
  }
  function reportBody(res,perAcct){
    var dash=(res&&res.dashboard)||null;
    var wrap=el("div");
    if(!dash){
      wrap.appendChild(el("div",{class:"card app-card"},[el("div",{class:"card-b"},[
        el("div",{class:"alert info",text:"بيانات التقرير غير متوفرة لهذا الحساب — يتطلب هذا التقرير نسخة أحدث من الخادم."})
      ])]));
      return wrap;
    }
    var paid=repNum(dash.paidCount), unpaid=repNum(dash.unpaidCount);
    var totalSubs=dash.totalSubscribers!=null?repNum(dash.totalSubscribers):(paid+unpaid);
    // v23 (§2.1): prefer the backend's category-aware `expected`. Older backends
    // omit it → fall back to totalAmps × pricePerAmp (standard), which is only
    // correct for single-tariff accounts.
    var expected=dash.expected!=null?repNum(dash.expected):repNum(dash.totalAmps)*repNum(dash.pricePerAmp);
    var collected=repNum(dash.collected);
    var remaining=repNum(dash.totalDue);
    var hasExpenses=dash.expensesTotal!=null;          // older backends omit these
    var expenses=repNum(dash.expensesTotal);
    var hasNet=dash.netProfit!=null||hasExpenses;
    var net=dash.netProfit!=null?repNum(dash.netProfit):(collected-expenses);

    // v14: collection-rate gauge removed from the report.
    wrap.appendChild(repChartCard("المسددون وغير المسددين",repDonut(paid,unpaid,totalSubs)));

    /* v26: label SWAP requested by the owner (their business terminology, in
       lockstep with the app's reports screen): the collected-cash figure is
       titled "صافي الربح" and the collected-minus-expenses figure is titled
       "الإيرادات المحصلة". Values/bindings unchanged. */
    var bars=[{label:"الوارد الكلي",value:collected,color:"#1565C0"}];
    if(hasExpenses) bars.push({label:"المصروفات",value:expenses,color:"#FB8C00"});
    if(hasNet) bars.push({label:"صافي الربح",value:net,color:"#00897B"});
    wrap.appendChild(repChartCard("المحصّل والمصروفات والأرباح",repBars(bars)));

    var cards=[
      {label:"المتوقع",value:fmtPrice(expected),icon:"account_balance_wallet",chip:"blue"},
      {label:"الوارد الكلي",value:fmtPrice(collected),icon:"check_circle",chip:"green"},
      {label:"المتبقي",value:fmtPrice(remaining),icon:"hourglass_top",chip:"red"}
    ];
    if(hasExpenses) cards.push({label:"المصروفات",value:fmtPrice(expenses),icon:"payments",chip:"orange"});
    if(hasNet) cards.push({label:"صافي الربح",value:fmtPrice(net),icon:"trending_up",chip:"teal",neg:net<0});
    // Ampere price per tariff: three cards (Gold / Regular / Commercial) from the
    // categoryPrices map. Gracefully falls back to a single سعر الأمبير card on
    // older backends that don't return categoryPrices (mirrors the optional-field
    // null-guard used for expenses/net above).
    var cp=dash.categoryPrices;
    if(cp&&typeof cp==="object"){
      cards.push({label:"سعر الأمبير - ذهبي",value:fmtPrice(repNum(cp.gold)),icon:"bolt",chip:"indigo"});
      cards.push({label:"سعر الأمبير - عادي",value:fmtPrice(repNum(cp.standard)),icon:"bolt",chip:"indigo"});
      cards.push({label:"سعر الأمبير - تجاري",value:fmtPrice(repNum(cp.commercial)),icon:"bolt",chip:"indigo"});
    } else {
      cards.push({label:"سعر الأمبير",value:fmtPrice(dash.pricePerAmp),icon:"bolt",chip:"indigo"});
    }
    // Per-tariff PAID counts (parity with the app reports). Older backends that
    // don't return paidByCategory simply omit these three cards.
    var pbc=dash.paidByCategory;
    if(pbc&&typeof pbc==="object"){
      cards.push({label:"المسددون - ذهبي",value:repNum(pbc.gold),icon:"check_circle",chip:"green"});
      cards.push({label:"المسددون - عادي",value:repNum(pbc.standard),icon:"check_circle",chip:"green"});
      cards.push({label:"المسددون - تجاري",value:repNum(pbc.commercial),icon:"check_circle",chip:"green"});
    }

    wrap.appendChild(el("div",{class:"app-section-title",text:"إجماليات الشهر"}));
    var grid=el("div",{class:"app-grid"});
    cards.forEach(function(c){
      grid.appendChild(el("div",{class:"app-stat"},[
        el("div",{class:"app-chip "+c.chip},[mi(c.icon)]),
        el("div",{class:"num sm",style:c.neg?"color:#c62828":null,text:c.value}),
        el("div",{class:"lbl",text:c.label})
      ]));
    });
    wrap.appendChild(grid);

    // v14 (item 3): per-accountant breakdown — each accountant's OWN paid /
    // unpaid / collected this month (paid = subscribers that accountant
    // collected from). Listed all at once below the overall report.
    if(Array.isArray(perAcct) && perAcct.length){
      wrap.appendChild(el("div",{class:"app-section-title",text:"حسب المحاسب"}));
      perAcct.forEach(function(pa){
        var d=pa.dash||{};
        wrap.appendChild(el("div",{class:"card app-card",style:"margin-bottom:10px"},[
          el("div",{class:"card-b"},[
            el("div",{style:"font-weight:700;margin-bottom:8px"},[pa.acct.name||"—"]),
            el("div",{class:"app-grid"},[
              el("div",{class:"app-stat"},[el("div",{class:"app-chip green"},[mi("check_circle")]),el("div",{class:"num sm",text:repNum(d.paidCount)}),el("div",{class:"lbl",text:"المسددون"})]),
              el("div",{class:"app-stat"},[el("div",{class:"app-chip red"},[mi("error")]),el("div",{class:"num sm",text:repNum(d.unpaidCount)}),el("div",{class:"lbl",text:"غير المسددين"})]),
              el("div",{class:"app-stat"},[el("div",{class:"app-chip blue"},[mi("payments")]),el("div",{class:"num sm",text:fmtPrice(repNum(d.collected))}),el("div",{class:"lbl",text:"المحصّل"})])
            ])
          ])
        ]));
      });
    }
    return wrap;
  }
  load();
}

/* Owner entity screen (#/my/data/:entity[/by/:relField/:relValue]).
   Same search + pagination UX as the admin screen, but read-only. */

    drill={label:"التفاصيل",onClick:function(r){ location.hash="#/my/data/receipts/detail/"+encodeURIComponent(r.localId); }};
  }

  if(entity==="boards"||entity==="circuits"||entity==="expenses"||entity==="monthly_prices"||entity==="settlements"){
    drill={label:"التفاصيل",onClick:function(r){ location.hash="#/my/data/"+entity+"/detail/"+encodeURIComponent(r.localId); }};
  }

  var query="";
  var page=1;
  // v23 (§7): expenses-only filter state (owner browses one accountant + month).
  var acctFilter="";   // "" all · "__none__" owner · <accountant id>
  var monthFilter="";  // "YYYY-MM"
  var acctList=[];     // [{id,name}] for the dropdown
  var expenseFilterWrap=el("div");
  var totalWrap=el("div");
  var filtersPainted=false;

  // Name maps for FK columns (circuits→boards, settlements/expenses→accountants)
  // so tables render names, never raw ids; fetched once per screen, reused.
  var relNameMaps=null;
  function ensureRelMaps(){
    if(relNameMaps) return Promise.resolve(relNameMaps);
    if(entity==="circuits"){
      return loadNameMaps(function(en,opts){ return acctData(en,opts); },["boards"]).then(function(maps){
        relNameMaps=maps; return maps;
      });
    }
    if(entity==="settlements"||entity==="expenses"){
      // Robust accountants map (name OR username) — loadNameMaps only keys on
      // name/code and would drop username-only accountants.
      return acctData("accountants",{limit:200}).then(function(res){
        var accts={}; acctList=[];
        normalizeList(res,"records").forEach(function(r){
          var d=(r&&r.data)||{}; var nm=d.name||d.username;
          var id=(d.id!=null?d.id:r.localId);
          if(nm&&id!=null){
            accts[id]=nm; if(r.localId!=null) accts[r.localId]=nm;
            acctList.push({id:String(id),name:nm});
          }
        });
        relNameMaps={accountants:accts}; return relNameMaps;
      }).catch(function(){ relNameMaps={accountants:{}}; return relNameMaps; });
    }
    return Promise.resolve(null);
  }

  // v23 (§7): the expenses accountant dropdown + month input (built once maps
  // are available). Changing either resets to page 1.
  function paintExpenseFilters(){
    if(entity!=="expenses"||filtersPainted) return;
    filtersPainted=true;
    clear(expenseFilterWrap);
    var sel=el("select",{class:"input"});
    sel.appendChild(el("option",{value:"",text:"كل المحاسبين"}));
    sel.appendChild(el("option",{value:"__none__",text:"المالك"}));
    acctList.forEach(function(a){ sel.appendChild(el("option",{value:a.id,text:a.name})); });
    sel.value=acctFilter;
    sel.addEventListener("change",function(){ acctFilter=sel.value; page=1; load(); });
    var mon=el("input",{class:"input",type:"month",value:monthFilter});
    mon.addEventListener("change",function(){ monthFilter=mon.value; page=1; load(); });
    expenseFilterWrap.appendChild(el("div",{class:"toolbar"},[
      el("span",{class:"muted",text:"المحاسب:"}), sel,
      el("span",{class:"muted",text:"الشهر:"}), mon
    ]));
  }

  // Settlements: owner approves/rejects a PENDING wallet request inline. After a
  // decision, reload the list + toast (mirrors the plan-approve flow).
  function settlementActions(r){
    var d=(r&&r.data)||{};
    if(d.status!=="pending") return [];
    function decide(status,okMsg,amount){
      API.decideSettlement(r.localId,status,undefined,amount).then(function(){
        toast(okMsg,"ok"); load();
      }).catch(function(err){ toast(err.message||"تعذّر تنفيذ الإجراء","err"); });
    }
    // v28 item 12 (Flutter parity): approving a SALARY request first asks the
    // owner for the amount (the accountant requested it with none). Cash/card
    // approvals keep the accountant's own amount and skip the prompt.
    function approve(){
      if(d.method==="salary"){
        var raw=window.prompt("مبلغ الراتب (د.ع):","");
        if(raw===null) return;                 // cancelled
        // Strip ASCII + Arabic grouping separators/whitespace before parsing.
        var amt=parseFloat(String(raw).replace(/[,،٬\s]/g,""));
        if(!isFinite(amt)||amt<=0){ toast("أدخل مبلغاً صحيحاً","err"); return; }
        decide("approved","تمت الموافقة على التسوية",amt);
      } else {
        decide("approved","تمت الموافقة على التسوية");
      }
    }
    return [
      el("button",{class:"btn sm success",onclick:approve},["موافقة"]),
      el("button",{class:"btn sm danger ghost",onclick:function(){ decide("rejected","تم رفض التسوية"); }},["رفض"])
    ];
  }

  var headWrap=el("div");
  var tableWrap=el("div");
  var pagerWrap=el("div");
  var searchIn=el("input",{class:"input",type:"text",placeholder:"ابحث في "+label+"…",value:""});

  function crumb(){
    return el("div",{class:"crumb"},[
      el("a",{href:"#/my",text:"لوحتي"}),
      el("span",{text:" / "+label+(relField?" (مُصفّى)":"")})
    ]);
  }

  function buildShell(){
    var content=el("div");
    content.appendChild(crumb());
    content.appendChild(headWrap);
    var toolbarKids=[
      el("div",{class:"search"},[el("span",{class:"ic"},[mi("search")]),searchIn]),
      el("div",{class:"grow"})
    ];
    if(relField){
      toolbarKids.push(el("a",{class:"btn neutral sm",href:"#/my/data/"+entity},["كل "+label+" ›"]));
    }
    toolbarKids.push(el("button",{class:"btn ghost",onclick:function(){ load(); }},["تحديث"]));
    content.appendChild(el("div",{class:"toolbar"},toolbarKids));
    if(entity==="expenses"){ content.appendChild(expenseFilterWrap); content.appendChild(totalWrap); }
    content.appendChild(tableWrap);
    content.appendChild(pagerWrap);
    shell("#/my/data/"+entity,content);
  }

  function paintHead(total){
    clear(headWrap);
    headWrap.appendChild(el("div",{class:"page-head"},[el("h1",{text:label+" ("+(total!=null?total:0)+")"})]));
  }

  function paintPager(total){
    clear(pagerWrap);
    var pages=Math.max(1,Math.ceil((total||0)/SYNC_PAGE_LIMIT));
    if(!total) return;
    pagerWrap.appendChild(el("div",{class:"toolbar",style:"justify-content:center;margin-top:6px"},[
      el("button",{class:"btn neutral sm",disabled:page<=1?"":false,onclick:function(){ if(page>1){ page--; load(); } }},["السابق ›"]),
      el("span",{class:"muted",style:"min-width:120px;text-align:center",text:"صفحة "+page+" / "+pages}),
      el("button",{class:"btn neutral sm",disabled:page>=pages?"":false,onclick:function(){ if(page<pages){ page++; load(); } }},["‹ التالي"])
    ]));
  }

  function load(){
    clear(tableWrap); tableWrap.appendChild(loadingBlock("جارٍ التحميل…"));
    clear(pagerWrap); clear(totalWrap);
    // v23 (§7): the expenses accountant dropdown overrides the drill relField.
    var effRelField=relField, effRelValue=relValue;
    if(entity==="expenses"&&acctFilter){ effRelField="accountant_id"; effRelValue=acctFilter; }
    Promise.all([
      acctData(entity,{q:query,page:page,limit:SYNC_PAGE_LIMIT,relField:effRelField,relValue:effRelValue,
        month:(entity==="expenses"&&monthFilter)?monthFilter:undefined,
        branchId:isBranchScopedEntity(entity)?ownerBranchParam():undefined}),
      ensureRelMaps()
    ]).then(function(both){
      var res=both[0], maps=both[1];
      var records=normalizeList(res,"records");
      var total=(res&&typeof res.total==="number")?res.total:records.length;
      if(res&&res.page) page=res.page;
      paintHead(total);
      paintPager(total);
      // v23 (§7): expenses accountant dropdown + month input + total row.
      paintExpenseFilters();
      if(entity==="expenses"){
        clear(totalWrap);
        var sum=(res&&typeof res.totalAmount==="number")?res.totalAmount:0;
        totalWrap.appendChild(el("div",{class:"card",style:"padding:10px;margin:6px 0;font-weight:bold"},[
          el("span",{text:"إجمالي المصروفات: "}), el("span",{text:fmtPrice(sum)})
        ]));
      }
      clear(tableWrap);
      // Read-only (no onDelete) except settlements, which get inline
      // approve/reject actions on pending rows.
      var extra=(entity==="settlements")?settlementActions:null;
      tableWrap.appendChild(renderSyncTable(entity,records,null,drill,maps,extra));
    }).catch(function(err){
      if(err.status===401) return;
      if(isFeatureDisabled(err)){ shell("#/my/data/"+entity,ownerFeatureBlock()); return; }
      clear(tableWrap); tableWrap.appendChild(errorBlock(err,load));
    });
  }

  // debounced search -> reset to page 1
  var debTimer=null;
  searchIn.addEventListener("input",function(){
    if(debTimer) clearTimeout(debTimer);
    debTimer=setTimeout(function(){
      query=searchIn.value.trim();
      page=1;
      load();
    },300);
  });

  paintHead(0);
  buildShell();
  load();
}

/* ============================================================
   v23 (§9): generic clean detail card for any synced entity (receipts keep
   their richer receiptDetailContent). Renders known fields with FK ids resolved
   to NAMES via `maps` ({boards,circuits,accountants,branches}), then any extra
   scalar fields — never a raw JSON dump.
   ============================================================ */
function entityDetailContent(entity,rec,d,maps){
  maps=maps||{};
  var kvs=[]; var handled={};
  var catMap={commercial:"تجاري",standard:"عادي",gold:"ذهبي (٢٤ ساعة)"};
  function row(label,val){ kvs.push.apply(kvs,kv(label,(val==null||val==="")?"—":String(val))); }
  function badgeRow(label,node){ kvs.push(el("div",{class:"k",text:label})); kvs.push(el("div",{class:"v"},[node])); }
  function nameOf(mapName,id){ var m=maps[mapName]||{}; return id!=null?(m[id]||id):null; }
  function mark(){ for(var i=0;i<arguments.length;i++) handled[arguments[i]]=1; }

  if(entity==="subscribers"){
    row("الاسم",d.name); row("الهاتف",d.phone); row("الأمبيرات",d.amps);
    row("الفئة",catMap[d.category]||d.category);
    row("اللوحة",nameOf("boards",d.board_id)); row("الجوزة",nameOf("circuits",d.circuit_id));
    row("الحالة",d.status); mark("name","phone","amps","category","board_id","circuit_id","status");
  } else if(entity==="boards"){
    row("الاسم",d.name); row("الرمز",d.code); mark("name","code");
  } else if(entity==="circuits"){
    row("الاسم",d.name); row("اللوحة",nameOf("boards",d.board_id)); row("الطور",d.phase);
    mark("name","board_id","phase");
  } else if(entity==="expenses"){
    row("الفئة",expenseCategoryLabel(d.category));
    row("المبلغ",d.amount!=null?fmtPrice(d.amount):null);
    row("المحاسب",d.accountant_id?nameOf("accountants",d.accountant_id):"المالك");
    row("ملاحظة",d.note); row("التاريخ",d.date?fmtDateShort(d.date):null);
    mark("category","amount","accountant_id","note","date");
  } else if(entity==="monthly_prices"){
    row("الشهر",d.month); row("الفئة",catMap[d.category]||d.category);
    row("سعر الأمبير",(d.price_per_amp!=null?fmtPrice(d.price_per_amp):(d.price!=null?fmtPrice(d.price):null)));
    mark("month","category","price_per_amp","price");
  } else if(entity==="settlements"){
    row("المحاسب",nameOf("accountants",d.accountant_id));
    row("المبلغ",d.amount!=null?fmtPrice(d.amount):null);
    row("الطريقة",settlementMethodLabel(d.method));
    badgeRow("الحالة",settlementStatusBadge(d.status));
    row("تاريخ الطلب",d.requested_at?fmtDate(d.requested_at):null);
    mark("accountant_id","amount","method","status","requested_at");
  }
  // Common branch field when present + not already shown.
  if(d.branch_id!=null&&!handled.branch_id){ row("الفرع",nameOf("branches",d.branch_id)); handled.branch_id=1; }
  // Any remaining scalar fields (never a raw JSON blob).
  Object.keys(d).forEach(function(k){
    if(handled[k]) return;
    if(k==="id"||k==="uuid"||k==="updated_at") return;
    var v=d[k]; if(v==null||v===""||typeof v==="object") return;
    row(k,v);
  });
  row("تاريخ المزامنة",rec.updatedAt?fmtDate(rec.updatedAt):null);
  row("المعرّف",rec.localId);

  return el("div",{class:"card"},[
    el("div",{class:"card-h"},[el("span",{text:ownerEntityLabel(entity)+" — التفاصيل"})]),
    el("div",{class:"card-b"},[el("div",{class:"kv"},kvs)])
  ]);
}

function openPlanModal(existing,onDone){
  var isEdit=!!existing;
  var p=existing||{};
  var code=el("input",{class:"input",type:"text",placeholder:"مثال: monthly",value:p.code||""});
  if(isEdit){ code.disabled=true; code.style.background="#f4f6fa"; }
  var name=el("input",{class:"input",type:"text",placeholder:"مثال: شهري",value:p.name||""});
  var duration=el("input",{class:"input",type:"number",min:"0",placeholder:"30",value:(p.durationDays!=null?p.durationDays:"")});
  var maxDev=el("input",{class:"input",type:"number",min:"1",placeholder:"1",value:(p.maxDevices!=null?p.maxDevices:"")});
  var price=el("input",{class:"input",type:"number",min:"0",placeholder:"0",value:(p.price!=null?p.price:"")});
  var desc=el("textarea",{class:"input",placeholder:"وصف اختياري"});
  desc.value=p.description||"";
  var activeChk=el("input",{type:"checkbox"});
  activeChk.checked=p.active!==false;
  // Per-plan capability flags (default ON for new/legacy plans where absent → treat undefined as true).
  var syncChk=el("input",{type:"checkbox"});
  syncChk.checked=p.syncEnabled!==false;
  var backupChk=el("input",{type:"checkbox"});
  backupChk.checked=p.backupEnabled!==false;
  var ownerPanelChk=el("input",{type:"checkbox"});
  ownerPanelChk.checked=p.ownerPanelEnabled!==false;
  // Multi-Branch is an opt-in upgrade → default OFF (=== true), unlike the above.
  var multiBranchChk=el("input",{type:"checkbox"});
  multiBranchChk.checked=p.multiBranchEnabled===true;
  var errBox=el("div");

  var saveBtn=el("button",{class:"btn",text:isEdit?"حفظ التغييرات":"إنشاء خطة",onclick:function(){
    clear(errBox);
    var body={
      code:(code.value||"").trim(),
      name:(name.value||"").trim(),
      durationDays:duration.value!==""?Number(duration.value):0,
      maxDevices:maxDev.value!==""?Number(maxDev.value):1,
      price:price.value!==""?Number(price.value):0,
      description:(desc.value||"").trim(),
      active:activeChk.checked,
      syncEnabled:syncChk.checked,
      backupEnabled:backupChk.checked,

    if(!body.code){ errBox.appendChild(el("div",{class:"alert err",text:"الرمز مطلوب."})); return; }

    saveBtn.disabled=true; clear(saveBtn); saveBtn.appendChild(el("span",{class:"spin white"}));
    API.upsertPlan(body).then(function(){
      toast(isEdit?"تم تحديث الخطة":"تم إنشاء الخطة","ok"); closeModal(); if(onDone) onDone();
    }).catch(function(err){
      saveBtn.disabled=false; clear(saveBtn); saveBtn.textContent=isEdit?"حفظ التغييرات":"إنشاء خطة";
      errBox.appendChild(el("div",{class:"alert err",text:err.message}));
    });
  }});

  modal({
    title:isEdit?("تعديل الخطة: "+(p.code||"")):"خطة جديدة", wide:true,
    body:el("div",[
      errBox,
      el("div",{class:"row"},[
        el("div",{class:"field"},[el("label",{text:"الرمز"+(isEdit?" (مقفل)":"")}),code]),
        el("div",{class:"field"},[el("label",{text:"الاسم"}),name])
      ]),
      el("div",{class:"row"},[
        el("div",{class:"field"},[el("label",{text:"المدة (أيام)"}),duration]),
        el("div",{class:"field"},[el("label",{text:"أقصى عدد أجهزة"}),maxDev]),
        el("div",{class:"field"},[el("label",{text:"السعر (د.ع)"}),price])
      ]),
      el("div",{class:"field"},[el("label",{text:"الوصف"}),desc]),
      el("div",{class:"field"},[el("label",{class:"check"},[activeChk,el("span",{text:"نشطة (مرئية للمستخدمين)"})])]),
      el("div",{class:"field"},[
        el("label",{text:"الميزات المتاحة في الخطة"}),
        el("label",{class:"check"},[syncChk,el("span",{text:"مزامنة البيانات"})]),
        el("label",{class:"check",style:"margin-top:8px"},[backupChk,el("span",{text:"النسخ الاحتياطي"})]),
        el("label",{class:"check",style:"margin-top:8px"},[ownerPanelChk,el("span",{text:"لوحة المالك"})]),
        el("label",{class:"check",style:"margin-top:8px"},[multiBranchChk,el("span",{text:"تعدّد الفروع (Multi-Branch)"})])

function errorBlock(err,retry){
  var content=el("div");
  content.appendChild(pageHead("حدث خطأ ما"));
  content.appendChild(el("div",{class:"card"},[el("div",{class:"card-b"},[
    el("div",{class:"alert err",text:err.message||"خطأ غير متوقع."}),
    retry?el("button",{class:"btn ghost",onclick:retry},["إعادة المحاولة"]):null
  ])]));
  return content;
}
function normalizeList(res,key){
  if(!res) return [];
  if(Array.isArray(res)) return res;
  if(Array.isArray(res[key])) return res[key];
  if(Array.isArray(res.data)) return res.data;
  return [];
}

/* ============================================================
   Public receipt verification (#/r/:uuid) — renders WITHOUT login.
   Standalone Arabic card; no sidebar/nav. Fetches the public endpoint.
   ============================================================ */
function viewPublicReceipt(uuid){
  setOwnerMode(false);
  var app=$("#app"); clear(app);
  var screen=el("div",{class:"receipt-screen"});
  var card=el("div",{class:"receipt-card"});
  card.appendChild(el("div",{class:"r-body",style:"padding:48px 22px"},[loadingBlock("جارٍ التحقق من الوصل…")]));
  screen.appendChild(card);
  app.appendChild(screen);

  API.publicReceipt(uuid).then(function(res){
    clear(card);
    var found=res&&res.found&&res.receipt;
    var genName=(res&&res.generatorName)||"المولّدة";
    card.appendChild(el("div",{class:"r-head"},[
      el("h1",{class:"gen",text:genName}),
      el("p",{class:"tag",text:found?"وصل استلام":"التحقق من الوصل"})
    ]));

    if(!found){
      card.appendChild(el("div",{class:"r-empty"},[
        el("div",{class:"big"},[mi("receipt_long")]),
        el("div",{style:"font-weight:700;font-size:16px;color:var(--text)",text:"غير موجود"}),
        el("div",{style:"margin-top:6px",text:"تعذّر العثور على هذا الوصل."})
      ]));
      return;
    }

    var r=res.receipt;
    var status=(r.status||"valid");
    var stBadge=el("span",{class:"badge "+(status==="valid"?"green":(status==="deleted"?"gray":"red"))},[
      status==="valid"?"صالح":(status==="deleted"?"محذوف":status)
    ]);

    card.appendChild(el("div",{class:"r-no",text:"وصل استلام رقم #"+(r.receipt_no!=null?r.receipt_no:"—")}));

    var body=el("div",{class:"r-body"});
    function line(k,v){
      body.appendChild(el("div",{class:"r-line"},[
        el("span",{class:"k",text:k}),
        (v&&v.nodeType)?el("span",{class:"v"},[v]):el("span",{class:"v",text:(v==null||v==="")?"—":String(v)})
      ]));
    }
    // Same fields + order as the printed paper receipt (bluetooth/pdf), so the
    // QR-scanned invoice is identical to the one handed to the customer.
    line("التاريخ", r.issued_at?fmtDate(r.issued_at):"—");
    line("المشترك", (res.subscriberName||"—"));
    line("الشهر", r.month);
    line("الأمبيرات", r.amps_snapshot);
    line("سعر الأمبير", r.price_snapshot!=null?fmtPrice(r.price_snapshot):"—");
    line("نوع الاشتراك", catLabel(r.category_snapshot));
    line("المدفوع", r.paid_amount!=null?fmtPrice(r.paid_amount):"—");
    line("طريقة الدفع", paymentMethodLabel(r.payment_method));
    line("الخصم", receiptDiscountText(r));
    line("المتبقي", r.remaining_after!=null?fmtPrice(r.remaining_after):"—");
    if(res.accountantName) line("المحاسب", res.accountantName);
    line("الحالة", stBadge);
    card.appendChild(body);

    // Button → the same subscriber's invoice history (public).
    card.appendChild(el("div",{class:"r-body",style:"padding-top:0"},[
      el("a",{
        class:"btn ghost",
        style:"width:100%;justify-content:center",
        href:"#/r/"+encodeURIComponent(uuid)+"/history"
      },["عرض الفواتير السابقة"])
    ]));
  }).catch(function(err){
    clear(card);
    card.appendChild(el("div",{class:"r-head"},[
      el("h1",{class:"gen",text:"المولّدة"}),
      el("p",{class:"tag",text:"التحقق من الوصل"})
    ]));
    card.appendChild(el("div",{class:"r-empty"},[
      el("div",{class:"big"},[mi("warning")]),
      el("div",{style:"font-weight:700;font-size:16px;color:var(--text)",text:"تعذّر التحقق"}),
      el("div",{style:"margin-top:6px",text:err.message||"حدث خطأ أثناء جلب الوصل."})
    ]));
  });
}

        var status=(r.status||"valid");
        var st=el("span",{class:"badge "+(status==="valid"?"green":(status==="deleted"?"gray":"red"))},[
          status==="valid"?"صالح":(status==="deleted"?"محذوف":status)
        ]);
        body.appendChild(el("a",{
          class:"r-line",
          style:"text-decoration:none;cursor:pointer;display:flex;align-items:center;gap:10px",
          href: r.uuid?("#/r/"+encodeURIComponent(r.uuid)):"javascript:void(0)"
        },[
          el("span",{class:"k",style:"min-width:58px",text:"#"+(r.receipt_no!=null?r.receipt_no:"—")}),
          el("span",{class:"v",style:"flex:1",text:(r.month||"—")}),
          el("span",{class:"v",style:"font-weight:700",text:(r.paid_amount!=null?fmtPrice(r.paid_amount):"—")}),
          st
        ]));
      });
      card.appendChild(body);
    }

    card.appendChild(el("div",{class:"r-body",style:"padding-top:0"},[
      el("a",{class:"btn ghost",style:"width:100%;justify-content:center",href:"#/r/"+encodeURIComponent(uuid)},["‹ رجوع للوصل"])
    ]));
  }).catch(function(err){
    clear(card);
    card.appendChild(el("div",{class:"r-head"},[
      el("h1",{class:"gen",text:"المولّدة"}),
      el("p",{class:"tag",text:"الفواتير السابقة"})
    ]));
    card.appendChild(el("div",{class:"r-empty"},[
      el("div",{class:"big"},[mi("warning")]),
      el("div",{style:"font-weight:700;font-size:16px;color:var(--text)",text:"تعذّر التحميل"}),
      el("div",{style:"margin-top:6px",text:err.message||"حدث خطأ."})
    ]));
  });
}

/* ============================================================
   Boot
   ============================================================ */
function boot(){
  // Validate existing token against /me so a stale token doesn't show a broken UI.
  if(state.token && (!location.hash || location.hash==="#/login")){
    location.hash=homeHash();
  }
  render();
  if(state.token && !currentRouteIsPublic()){
    if(isAdmin()) connectEvents();   // real-time notifications (admin sessions only)
    API.me().then(function(res){
      var acc=(res&&res.account)||res;
      if(acc){
        setSession(state.token,acc);   // owners are allowed; role kept in state.me
        // Re-route if the refreshed role doesn't match the current area.
        if(!currentRouteIsPublic()){
          var ownerArea=/^#\/my(\/|$)/.test(location.hash||"");
          if(isAdmin() && ownerArea) location.hash="#/dashboard";
          else if(!isAdmin() && !ownerArea) location.hash="#/my";
        }
      }
    }).catch(function(){ /* 401 handled inside api() */ });
  }
}
boot();

/* expose a couple of helpers for debugging */
window.__moldatiAdmin={state:state,API:API};
})();
</script>
</body>
