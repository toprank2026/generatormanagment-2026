<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="light" />
<title>Flash</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..600,0..1,0">
<style>
  /* Material Symbols icon helper (FILL 1 ŌåÆ matches the app's filled Icons.*) */
  .msi{font-family:'Material Symbols Outlined';font-weight:500;font-style:normal;display:inline-block;line-height:1;letter-spacing:normal;text-transform:none;white-space:nowrap;word-wrap:normal;direction:ltr;-webkit-font-smoothing:antialiased;font-variation-settings:'FILL' 1;vertical-align:middle}
  :root{
    --primary:#1565C0;
    --primary-dark:#0d47a1;
    --primary-light:#e3f0fc;
    --bg:#f4f6fa;
    --surface:#ffffff;
    --border:#e2e6ee;
    --text:#1f2733;
    --muted:#69748a;
    --danger:#d32f2f;
    --danger-light:#fdecec;
    --success:#2e7d32;
    --success-light:#e8f5e9;
    --warn:#ed6c02;
    --warn-light:#fff4e5;
    --radius:12px;
    --shadow:0 1px 3px rgba(16,24,40,.08),0 1px 2px rgba(16,24,40,.04);
    --shadow-lg:0 12px 32px rgba(16,24,40,.18);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Segoe UI","Tahoma","Cairo",-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--primary);text-decoration:none}
  a:hover{text-decoration:underline}
  button{font-family:inherit;font-size:14px;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}

  /* ---------- buttons ---------- */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    padding:9px 16px;border-radius:9px;border:1px solid transparent;
    background:var(--primary);color:#fff;font-weight:600;transition:.15s;white-space:nowrap;
  }
  .btn:hover{background:var(--primary-dark)}
  .btn:disabled{opacity:.55;cursor:not-allowed}
  .btn.sm{padding:6px 11px;font-size:13px;border-radius:7px}
  .btn.ghost{background:transparent;color:var(--primary);border-color:var(--border)}
  .btn.ghost:hover{background:var(--primary-light)}
  .btn.danger{background:var(--danger)}
  .btn.danger:hover{background:#b71c1c}
  .btn.danger.ghost{background:transparent;color:var(--danger);border-color:#f3c6c6}
  .btn.danger.ghost:hover{background:var(--danger-light)}
  .btn.success{background:var(--success)}
  .btn.success:hover{background:#1b5e20}
  .btn.warn{background:var(--warn)}
  .btn.warn:hover{background:#c65a00}
  .btn.neutral{background:#eef1f6;color:var(--text);border-color:var(--border)}
  .btn.neutral:hover{background:#e3e8f0}

  /* ---------- form ---------- */
  label{display:block;font-weight:600;margin-bottom:6px;font-size:13px;color:var(--text)}
  .field{margin-bottom:16px}
  .input,select.input,textarea.input{
    width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:9px;
    background:#fff;color:var(--text);transition:.15s;outline:none;
  }
  .input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
  textarea.input{resize:vertical;min-height:70px}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .row>.field{flex:1;min-width:160px}
  .check{display:flex;align-items:center;gap:8px;font-weight:600;cursor:pointer}
  .check input{width:16px;height:16px;cursor:pointer}

  /* ---------- layout (RTL vertical sidebar on the right) ---------- */
  .sidebar{
    position:fixed;top:0;right:0;bottom:0;z-index:50;width:248px;
    background:var(--primary);color:#fff;display:flex;flex-direction:column;
    box-shadow:var(--shadow);
  }
  .sidebar .brand{
    font-weight:800;font-size:18px;letter-spacing:.3px;display:flex;align-items:center;gap:10px;
    padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.14);
  }
  .sidebar .brand .logo{
    width:30px;height:30px;border-radius:8px;background:#fff;color:var(--primary);
    display:grid;place-items:center;font-weight:900;font-size:16px;
    object-fit:contain;padding:3px;
  }
  .sidebar nav{display:flex;flex-direction:column;gap:4px;padding:14px 12px;flex:1;overflow-y:auto}
  .sidebar nav a{
    color:#e8f0fb;padding:11px 14px;border-radius:9px;font-weight:600;font-size:14.5px;
    display:flex;align-items:center;gap:9px;
  }
  .sidebar nav a:hover{background:rgba(255,255,255,.14);text-decoration:none}
  .sidebar nav a.active{background:#fff;color:var(--primary)}
  .sidebar .foot{
    border-top:1px solid rgba(255,255,255,.14);padding:14px 16px;display:flex;flex-direction:column;gap:10px;
  }
  .sidebar .foot .who{font-size:13.5px;color:#eef4fd;font-weight:600;word-break:break-word}
  .sidebar .logout{
    background:rgba(255,255,255,.16);border:none;color:#fff;padding:9px 13px;border-radius:8px;font-weight:600;text-align:center;
  }
  .sidebar .logout:hover{background:rgba(255,255,255,.28)}

  .wrap{max-width:1080px;margin:0 auto;padding:24px 20px 60px;margin-right:248px}
  @media(max-width:760px){
    .sidebar{position:static;width:100%;flex-direction:column}
    .sidebar nav{flex-direction:row;flex-wrap:wrap;overflow-x:auto}
    .sidebar nav a{padding:8px 12px}
    .sidebar .foot{flex-direction:row;align-items:center;justify-content:space-between}
    .wrap{margin-right:0}
  }
  .page-head{display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap}
  .page-head h1{font-size:22px;margin:0;font-weight:700;flex:1}
  .crumb{color:var(--muted);font-size:13px;margin-bottom:6px}
  .crumb a{font-weight:600}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:18px}
  .card .card-h{padding:15px 18px;border-bottom:1px solid var(--border);font-weight:700;font-size:15px;display:flex;align-items:center;gap:10px}
  .card .card-h .sub{font-weight:500;color:var(--muted);font-size:13px}
  .card .card-b{padding:18px}
  .card .card-b.flush{padding:0}

  /* ---------- stats ---------- */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:8px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;position:relative;overflow:hidden}
  .stat .lbl{color:var(--muted);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .stat .val{font-size:34px;font-weight:800;margin-top:6px;color:var(--primary)}
  .stat .ic{position:absolute;left:14px;top:14px;width:40px;height:40px;border-radius:11px;background:var(--primary-light);display:grid;place-items:center;font-size:22px;color:var(--primary)}

  /* ---------- table ---------- */
  .tbl-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse}
  th,td{padding:12px 16px;text-align:right;border-bottom:1px solid var(--border);vertical-align:middle}
  th{font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700;background:#fafbfd}
  tbody tr:hover{background:#fafbff}
  tbody tr:last-child td{border-bottom:none}
  td .acts{display:flex;gap:7px;flex-wrap:wrap}

  /* ---------- badges ---------- */
  .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700;line-height:1.6}
  .badge.green{background:var(--success-light);color:var(--success)}
  .badge.red{background:var(--danger-light);color:var(--danger)}
  .badge.orange{background:var(--warn-light);color:var(--warn)}
  .badge.blue{background:var(--primary-light);color:var(--primary)}
  .badge.gray{background:#eef1f6;color:var(--muted)}
  .badge .dot{width:7px;height:7px;border-radius:50%;background:currentColor}

  /* ---------- detail grid ---------- */
  .kv{display:grid;grid-template-columns:160px 1fr;gap:10px 18px}
  .kv .k{color:var(--muted);font-weight:600}
  .kv .v{font-weight:600;word-break:break-word}
  @media(max-width:560px){.kv{grid-template-columns:1fr;gap:2px 0}.kv .k{margin-top:8px}}

  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .toolbar .grow{flex:1}
  .search{position:relative;flex:1;min-width:200px;max-width:340px}
  .search input{padding-right:36px}
  .search .ic{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--muted);display:flex;align-items:center}
  .search .ic .msi{font-size:18px}

  .empty{padding:48px 20px;text-align:center;color:var(--muted)}
  .empty .big{font-size:40px;margin-bottom:8px;opacity:.6}

  /* ---------- spinner ---------- */
  .spin{width:18px;height:18px;border:2.5px solid rgba(21,101,192,.25);border-top-color:var(--primary);border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
  .spin.white{border-color:rgba(255,255,255,.4);border-top-color:#fff}
  .spin.lg{width:34px;height:34px;border-width:3.5px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .loading-box{display:flex;flex-direction:column;align-items:center;gap:12px;padding:54px 20px;color:var(--muted)}

  /* ---------- login ---------- */
  .login-screen{min-height:100vh;display:grid;place-items:center;padding:24px;
    background:linear-gradient(135deg,#1565C0 0%,#0d47a1 100%);}
  .login-card{width:100%;max-width:380px;background:#fff;border-radius:16px;box-shadow:var(--shadow-lg);padding:32px 30px}
  .login-card .logo-big{width:64px;height:64px;border-radius:14px;background:transparent;object-fit:contain;display:block;margin:0 auto 16px}
  .login-card h2{text-align:center;margin:0 0 4px;font-size:22px}
  .login-card .tag{text-align:center;color:var(--muted);margin:0 0 24px;font-size:13px}
  .login-card .btn{width:100%;padding:12px;font-size:15px}

  /* ---------- public receipt (standalone, no sidebar) ---------- */
  .receipt-screen{min-height:100vh;display:grid;place-items:center;padding:24px;
    background:#fff;}
  .receipt-card{width:100%;max-width:430px;background:#fff;border-radius:16px;box-shadow:var(--shadow-lg);overflow:hidden}
  .receipt-card .r-head{background:var(--primary);color:#fff;text-align:center;padding:22px 22px 18px}
  .receipt-card .r-head .gen{font-size:21px;font-weight:800;margin:0}
  .receipt-card .r-head .tag{font-size:13px;opacity:.92;margin:6px 0 0}
  .receipt-card .r-no{text-align:center;font-size:17px;font-weight:800;color:var(--primary);padding:16px 22px 4px}
  .receipt-card .r-body{padding:8px 22px 22px}
  .receipt-card .r-line{display:flex;justify-content:space-between;gap:14px;padding:11px 0;border-bottom:1px dashed var(--border)}
  .receipt-card .r-line:last-child{border-bottom:none}
  .receipt-card .r-line .k{color:var(--muted);font-weight:600}
  .receipt-card .r-line .v{font-weight:700;text-align:left}
  .receipt-card .r-empty{padding:40px 22px;text-align:center;color:var(--muted)}
  .receipt-card .r-empty .big{font-size:46px;margin-bottom:10px;opacity:.6}

  /* ---------- toast ---------- */
  #toasts{position:fixed;left:18px;bottom:18px;z-index:1000;display:flex;flex-direction:column;gap:10px;max-width:340px}
  .toast{background:#222b3a;color:#fff;padding:13px 16px;border-radius:10px;box-shadow:var(--shadow-lg);font-weight:600;font-size:13px;display:flex;gap:10px;align-items:flex-start;animation:slidein .25s ease}
  .toast.ok{background:#1b5e20}
  .toast.err{background:#b71c1c}
  .toast .x{margin-right:auto;cursor:pointer;opacity:.8;font-weight:800}
  @keyframes slidein{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}

  /* ---------- new-account popup (real-time SSE) ---------- */
  #popups{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:1100;display:flex;flex-direction:column;gap:12px;width:min(420px,calc(100vw - 36px));pointer-events:none}
  .popup{
    pointer-events:auto;background:#fff;border:1px solid var(--border);border-right:5px solid var(--success);
    border-radius:14px;box-shadow:var(--shadow-lg);padding:16px 18px;display:flex;gap:14px;align-items:flex-start;
    animation:popdrop .3s cubic-bezier(.2,.9,.3,1.4);
  }
  .popup .pic{width:44px;height:44px;border-radius:12px;background:var(--success-light);color:var(--success);display:grid;place-items:center;font-size:26px;flex-shrink:0}
  .popup .ptxt{flex:1;min-width:0}
  .popup .ptitle{font-weight:800;font-size:15px;color:var(--text);margin-bottom:3px}
  .popup .pname{font-weight:700;color:var(--success);word-break:break-word}
  .popup .psub{color:var(--muted);font-size:13px;margin-top:2px;word-break:break-word}
  .popup .x{background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;line-height:1;align-self:flex-start;padding:0 2px}
  @keyframes popdrop{from{transform:translateY(-26px) scale(.96);opacity:0}to{transform:none;opacity:1}}

  /* ---------- modal ---------- */
  .modal-back{position:fixed;inset:0;background:rgba(16,24,40,.5);z-index:500;display:grid;place-items:center;padding:20px;animation:fade .15s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:#fff;border-radius:14px;box-shadow:var(--shadow-lg);width:100%;max-width:440px;max-height:90vh;overflow:auto;animation:pop .18s}
  .modal.wide{max-width:560px}
  @keyframes pop{from{transform:translateY(12px) scale(.98);opacity:0}to{transform:none;opacity:1}}
  .modal .m-h{padding:18px 20px;border-bottom:1px solid var(--border);font-weight:700;font-size:17px;display:flex;align-items:center}
  .modal .m-h .x{margin-right:auto;background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;line-height:1}
  .modal .m-b{padding:20px}
  .modal .m-f{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
  .alert{padding:11px 14px;border-radius:9px;font-size:13px;font-weight:600;margin-bottom:14px}
  .alert.err{background:var(--danger-light);color:var(--danger)}
  .alert.info{background:var(--primary-light);color:var(--primary-dark)}

  .muted{color:var(--muted)}
  .nowrap{white-space:nowrap}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12.5px;direction:ltr;text-align:right;unicode-bidi:plaintext}
  .right{text-align:left}
  td.right .acts{justify-content:flex-end}
  .mt0{margin-top:0}.mb0{margin-bottom:0}
  hr.sep{border:none;border-top:1px solid var(--border);margin:18px 0}
  .pill-actions{display:flex;gap:8px;flex-wrap:wrap}

  /* ---------- owner app-like shell (phone-style, no sidebar) ---------- */
  body.owner-mode{background:#eaf1fa}
  body.owner-mode #toasts{bottom:84px}
  .app-topbar{
    position:fixed;top:0;left:0;right:0;z-index:60;background:var(--primary);color:#fff;
    display:flex;align-items:center;gap:10px;padding:10px 16px;box-shadow:var(--shadow);
  }
  .app-topbar .brand{font-weight:800;font-size:17px;display:flex;align-items:center;gap:9px;flex:1}
  .app-topbar .brand .logo{
    width:26px;height:26px;border-radius:7px;background:#fff;color:var(--primary);
    display:grid;place-items:center;font-weight:900;font-size:14px;
    object-fit:contain;padding:3px;
  }
  .app-topbar .logout{
    background:rgba(255,255,255,.16);border:none;color:#fff;padding:7px 12px;border-radius:8px;font-weight:600;font-size:13px;
  }
  .app-topbar .logout:hover{background:rgba(255,255,255,.28)}
  .app-wrap{max-width:600px;margin:0 auto;padding:64px 14px 96px}
  /* Persistent active-branch switcher (mirrors the app's dashboard selector). */
  .app-branchbar{
    display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--border);
    border-radius:14px;padding:10px 14px;margin-bottom:14px;box-shadow:0 1px 6px rgba(16,24,40,.05);
  }
  .app-branchbar .bb-ic{display:inline-flex;color:var(--primary)}
  .app-branchbar .bb-ic .material-icons-round{font-size:22px}
  .app-branchbar .bb-lbl{font-size:12.5px;color:var(--muted);font-weight:700}
  .app-branchbar .app-branch-select{
    flex:1;min-width:0;margin-inline-start:auto;border:1px solid var(--border);border-radius:10px;
    padding:8px 10px;font-size:14px;font-weight:700;color:var(--text);background:#f8fafc;
    font-family:inherit;text-align:right;cursor:pointer;
  }
  .app-branchbar .app-branch-select:focus{outline:none;border-color:var(--primary)}
  .app-bottomnav{
    position:fixed;bottom:0;left:0;right:0;z-index:60;background:#fff;border-top:1px solid var(--border);
    display:flex;justify-content:space-around;padding:6px 4px calc(6px + env(safe-area-inset-bottom));
    box-shadow:0 -2px 12px rgba(16,24,40,.08);
  }
  .app-bottomnav a,.app-bottomnav button{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;
    color:var(--muted);font-size:10.5px;font-weight:700;padding:4px 1px;border-radius:10px;text-decoration:none;cursor:pointer;
    min-width:0;white-space:nowrap;
  }
  .app-bottomnav a:hover,.app-bottomnav button:hover{text-decoration:none;color:var(--primary)}
  .app-bottomnav .t-ic{font-size:22px;line-height:1.2;display:flex;align-items:center;justify-content:center}
  .app-bottomnav .active{color:var(--primary)}
  .app-sheet-back{position:fixed;inset:0;z-index:70;background:rgba(16,24,40,.35);animation:fade .15s}
  .app-sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:71;background:#fff;border-radius:16px 16px 0 0;
    box-shadow:var(--shadow-lg);max-width:600px;margin:0 auto;
    padding:10px 14px calc(16px + env(safe-area-inset-bottom));animation:sheetup .2s ease;
  }
  @keyframes sheetup{from{transform:translateY(24px);opacity:0}to{transform:none;opacity:1}}
  .app-sheet .s-grab{width:42px;height:4px;border-radius:99px;background:var(--border);margin:2px auto 12px}
  .app-sheet a{display:flex;align-items:center;gap:12px;padding:13px 10px;border-radius:11px;color:var(--text);font-weight:700}
  .app-sheet a:hover{background:var(--primary-light);text-decoration:none}
  .app-sheet .s-ic{font-size:22px;color:var(--primary);display:flex;align-items:center}

  /* owner home: gradient banner + 2-column app stat cards */
  .app-banner{
    background:linear-gradient(135deg,#1565C0 0%,#42A5F5 100%);border-radius:16px;color:#fff;
    padding:18px 20px;margin-bottom:18px;box-shadow:var(--shadow);
  }
  .app-banner .b-row{display:flex;align-items:center;gap:10px;padding:4px 0}
  .app-banner .b-ic{font-size:20px;display:flex;align-items:center}
  .app-banner .b-name{font-weight:800;font-size:18px}
  .app-banner .b-sub{font-size:14px;opacity:.95}
  .app-section-title{font-weight:800;font-size:16px;margin:4px 2px 12px}
  .app-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:18px}
  .app-stat{
    display:block;background:#fff;border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);
    padding:14px;text-decoration:none;color:var(--text);
  }
  .app-stat:hover{text-decoration:none;box-shadow:var(--shadow-lg)}
  .app-chip{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:22px;margin-bottom:10px}
  .app-chip.blue{background:#e3f0fc;color:#1565C0}
  .app-chip.green{background:#e8f5e9;color:#2e7d32}
  .app-chip.red{background:#fdecec;color:#d32f2f}
  .app-chip.indigo{background:#e8eaf6;color:#3949ab}
  .app-chip.teal{background:#e0f2f1;color:#00897b}
  .app-chip.orange{background:#fff3e0;color:#fb8c00}
  .app-chip.purple{background:#f3e8fd;color:#7b3ff2}
  .app-stat .num{font-size:26px;font-weight:800;line-height:1.2}
  .app-stat .num.sm{font-size:18px}
  .app-stat .lbl{color:var(--muted);font-size:13px;font-weight:600;margin-top:2px}
  .app-card{border-radius:16px}

  /* owner monthly reports (#/my/reports): month picker + SVG/div charts */
  .rep-month{display:flex;align-items:center;justify-content:space-between;direction:ltr;padding:10px 12px;margin-bottom:14px}
  .rep-month .rep-chev{
    width:38px;height:38px;border:1px solid var(--border);border-radius:10px;background:#fff;
    color:var(--primary);font-size:20px;font-weight:800;cursor:pointer;line-height:1;
  }
  .rep-month .rep-chev:hover{background:var(--primary-light)}
  .rep-month .rep-month-lbl{font-weight:800;font-size:17px}
  .rep-acc{display:flex;align-items:center;gap:8px;padding:10px 12px;margin-bottom:14px}
  .rep-acc .rep-acc-ic{color:var(--primary);font-size:20px;display:inline-flex}
  .rep-acc .rep-acc-lbl{font-weight:800;font-size:14px;white-space:nowrap}
  .rep-acc .rep-acc-select{

(function(){

/* ============================================================

var TOKEN_KEY = "moldati_admin_token";
var ME_KEY    = "moldati_admin_me";
var API_BASE  = ""; // same origin

var state = {

function safeParse(s){ try{ return s ? JSON.parse(s) : null; }catch(e){ return null; } }

/* ============================================================
   Small DOM helpers
   ============================================================ */
function $(sel,root){ return (root||document).querySelector(sel); }
function el(tag,attrs,children){
  var n=document.createElement(tag);
  // Support the 2-arg form el(tag, childrenArray): if `attrs` is an array it is
  // really the children list (no attributes), e.g. el("tr",[td,td]).
  if(Array.isArray(attrs)){ children=attrs; attrs=null; }
  if(attrs){
    for(var k in attrs){
      if(k==="class") n.className=attrs[k];
      else if(k==="html") n.innerHTML=attrs[k];
      else if(k==="text") n.textContent=attrs[k];
      else if(k.slice(0,2)==="on" && typeof attrs[k]==="function") n.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
      else if(attrs[k]!==null && attrs[k]!==undefined && attrs[k]!==false) n.setAttribute(k,attrs[k]);
    }
  }
  if(children!=null) appendChildren(n,children);
  return n;
}
function appendChildren(n,children){
  (Array.isArray(children)?children:[children]).forEach(function(c){
    if(c==null||c===false) return;
    if(Array.isArray(c)){ appendChildren(n,c); return; } // flatten nested arrays (e.g. kv())
    n.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  });
}
/* Material Symbols icon: the text content is the icon NAME (ligature). */
function mi(name,style){ return el("span",{class:"msi","aria-hidden":"true",style:style||"",text:name}); }
function esc(s){
  if(s==null) return "";
  return String(s).replace(/[&<>"']/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
  });
}
function clear(n){ while(n.firstChild) n.removeChild(n.firstChild); }

/* ============================================================

/* Prominent real-time popup for a newly-registered account (auto-dismiss). */
function newAccountPopup(name,username){

/* ============================================================
   Formatting helpers
   ============================================================ */
function fmtDate(iso){
  if(!iso) return "ŌĆö";
  // Fallback returns the RAW value (callers render via textContent / el({text}),
  // which escapes for us ŌĆö esc() here would double-encode, e.g. "&lt;b&gt;x").
  var d=new Date(iso); if(isNaN(d)) return String(iso);
  return d.toLocaleString(undefined,{year:"numeric",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});
}
function fmtDateShort(iso){
  if(!iso) return "ŌĆö";
  var d=new Date(iso); if(isNaN(d)) return String(iso); // raw fallback (see fmtDate)
  return d.toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"});
}
function fmtPrice(p){
  if(p==null||p==="") return "ŌĆö";
  var n=Number(p); if(isNaN(n)) return String(p); // raw fallback (see fmtDate)
  try{ return new Intl.NumberFormat().format(n)+" ž».ž╣"; }catch(e){ return n+" ž».ž╣"; }
}
// Arabic tariff-type label for a subscriber category ŌĆö mirrors the Flutter
// SubscriberCategory.arabicLabel so the QR receipt matches the printed paper.
function catLabel(v){
  if(v==="gold") return "ž░┘ćž©┘Ŗ";
  if(v==="commercial") return "ž¬ž¼ž¦ž▒┘Ŗ";
  if(v==="standard") return "ž╣ž¦ž»┘Ŗ";
  return "ŌĆö";
}
// Payment-method label ('cash'->'┘å┘éž»┘Ŗ', 'card'->'ž©žĘž¦┘éž®'); raw value as fallback,
// "ŌĆö" when absent.
function paymentMethodLabel(v){
  if(v==="cash") return "┘å┘éž»┘Ŗ";
  if(v==="card") return "ž©žĘž¦┘éž®";
  return (v==null||v==="")?"ŌĆö":String(v);
}
// Discount line ŌĆö mirrors Flutter receiptDiscountText (printed receipt).
function fmtIntNum(n){ n=Number(n); return isNaN(n)?"0":String(Math.round(n)); }
function receiptDiscountText(r){
  var t=r&&r.discount_type, v=Number(r&&r.discount_value)||0;
  if(!t||t==="none"||v<=0) return "┘äž¦ ┘Ŗ┘łž¼ž» ž«žĄ┘ģ";
  if(t==="ampere"){
    var a=r.discount_amps;
    var amps=(a==null||a==="")?"":(" ("+fmtIntNum(a)+" žŻ┘ģž©┘Ŗž▒)");
    return fmtIntNum(v)+" ž».ž╣"+amps;
  }
  return fmtIntNum(v)+" ž».ž╣";
}
function statusBadge(status){
  var map={
    active:["green","┘åž┤žĘ"], pending:["orange","┘é┘Ŗž» ž¦┘äž¦┘åž¬žĖž¦ž▒"],
    rejected:["red","┘ģž▒┘ü┘łžČ"], expired:["gray","┘ģ┘åž¬┘ć┘Ź"], none:["gray","┘äž¦ ┘Ŗ┘łž¼ž»"]

}

    ? el("span",{class:"badge red"},[el("span",{class:"dot"}),"┘ģžŁžĖ┘łž▒"])
    : el("span",{class:"badge green"},[el("span",{class:"dot"}),"┘åž┤žĘ"]);
}

/* ============================================================
   API layer
   ============================================================ */
function ApiError(message,status,code){ this.message=message; this.status=status; this.code=code; }
ApiError.prototype=Object.create(Error.prototype);

function api(method,path,body,isForm){
  var opts={method:method,headers:{}};
  if(state.token) opts.headers["Authorization"]="Bearer "+state.token;
  if(body!=null && !isForm){
    opts.headers["Content-Type"]="application/json";
    opts.body=JSON.stringify(body);
  } else if(isForm){
    opts.body=body;
  }
  return fetch(API_BASE+path,opts).then(function(res){
    if(res.status===401){
      // session expired -> back to login, but never bounce a public page.
      if(!currentRouteIsPublic()) doLogout(true);
      throw new ApiError("ž¦┘åž¬┘ćž¬ ž¦┘äž¼┘äž│ž®. ┘Ŗž▒ž¼┘ē ž¬ž│ž¼┘Ŗ┘ä ž¦┘äž»ž«┘ł┘ä ┘ģž▒ž® žŻž«ž▒┘ē.",401);
    }
    var ct=res.headers.get("content-type")||"";
    var pj = ct.indexOf("application/json")>=0 ? res.json().catch(function(){return null;}) : Promise.resolve(null);
    return pj.then(function(data){
      if(!res.ok){
        var msg=(data&&data.message)||("Request failed ("+res.status+")");
        throw new ApiError(msg,res.status,data&&data.code);
      }
      return data;
    });
  },function(netErr){
    if(netErr instanceof ApiError) throw netErr;
    throw new ApiError("ž«žĘžŻ ┘ü┘Ŗ ž¦┘äž┤ž©┘āž® ŌĆö ž¬ž╣ž░┘æž▒ ž¦┘ä┘łžĄ┘ł┘ä žź┘ä┘ē ž¦┘äž«ž¦ž»┘ģ.",0);
  });
}
// Shared query-string builder for the synced-data endpoints (admin + owner).
function syncDataQuery(entity,opts){
  opts=opts||{};
  var q="?entity="+encodeURIComponent(entity);
  if(opts.q) q+="&q="+encodeURIComponent(opts.q);
  if(opts.page) q+="&page="+encodeURIComponent(opts.page);
  if(opts.limit) q+="&limit="+encodeURIComponent(opts.limit);
  if(opts.localId) q+="&localId="+encodeURIComponent(opts.localId);
  if(opts.includeDeleted) q+="&includeDeleted=true";
  if(opts.relField&&opts.relValue){ q+="&relField="+encodeURIComponent(opts.relField)+"&relValue="+encodeURIComponent(opts.relValue); }
  if(opts.branchId) q+="&branchId="+encodeURIComponent(opts.branchId);
  return q;
}
var API={
  login:function(username,password){ return api("POST","/api/auth/login",{username:username,password:password}); },
  me:function(){ return api("GET","/api/auth/me"); },
  // Owner self-service: the signed-in account's own stats + mirrored data.
  myStats:function(month,accountantId,branchId){
    var q=[];
    if(month) q.push("month="+encodeURIComponent(month));
    if(accountantId) q.push("accountantId="+encodeURIComponent(accountantId));
    if(branchId) q.push("branchId="+encodeURIComponent(branchId));
    return api("GET","/api/account/stats"+(q.length?("?"+q.join("&")):""));
  },
  myData:function(entity,opts){ return api("GET","/api/account/data"+syncDataQuery(entity,opts)); },
  myRecent:function(limit,page){ return api("GET","/api/account/recent?limit="+(limit||10)+"&page="+(page||1)); },
  // Flash v11: owner approves/rejects an accountant wallet settlement request
  // (mutates the owner mirror row in place; the accountant pulls the decision).
  decideSettlement:function(localId,status,note){
    var body={status:status,note:note};
    // When viewing a BRANCH account, the settlement lives in that branch's mirror
    // ŌĆö tell the backend which one (else it 404s "Settlement not found").
    if(typeof acctBranch!=="undefined" && acctBranch.id) body.branchId=acctBranch.id;
    return api("POST","/api/account/settlements/"+encodeURIComponent(localId)+"/decision",body);
  },
  // Flash item 7/8: the owner's BRANCH sub-accounts (own login, isolated mirror).
  branchAccounts:function(){ return api("GET","/api/account/branches"); },
  branchStats:function(branchId,month,accountantId){
    var q=[];
    if(month) q.push("month="+encodeURIComponent(month));
    if(accountantId) q.push("accountantId="+encodeURIComponent(accountantId));
    return api("GET","/api/account/branches/"+encodeURIComponent(branchId)+"/stats"+(q.length?("?"+q.join("&")):""));
  },
  branchData:function(branchId,entity,opts){
    return api("GET","/api/account/branches/"+encodeURIComponent(branchId)+"/data"+syncDataQuery(entity,opts));
  },
  users:function(){ return api("GET","/api/admin/users"); },
  user:function(id){ return api("GET","/api/admin/users/"+encodeURIComponent(id)); },
  userData:function(id,entity,opts){
    return api("GET","/api/admin/users/"+encodeURIComponent(id)+"/data"+syncDataQuery(entity,opts));
  },
  deleteUserData:function(id,entity,localId){
    return api("DELETE","/api/admin/users/"+encodeURIComponent(id)+"/data/"+encodeURIComponent(entity)+"/"+encodeURIComponent(localId));
  },
  createUser:function(body){ return api("POST","/api/admin/users",body); },
  deleteUser:function(id){ return api("DELETE","/api/admin/users/"+encodeURIComponent(id)); },
  setBlocked:function(id,blocked){ return api("PUT","/api/admin/users/"+encodeURIComponent(id)+"/blocked",{blocked:blocked}); },
  setPlan:function(id,planCode,status){ return api("PUT","/api/admin/users/"+encodeURIComponent(id)+"/plan",{planCode:planCode,status:status||"active"}); },
  approvePlan:function(id){ return api("POST","/api/admin/users/"+encodeURIComponent(id)+"/approve-plan",{}); },
  rejectPlan:function(id){ return api("POST","/api/admin/users/"+encodeURIComponent(id)+"/reject-plan",{}); },
  unbindDevice:function(id,deviceId){ return api("DELETE","/api/admin/users/"+encodeURIComponent(id)+"/devices/"+encodeURIComponent(deviceId)); },
  plans:function(){ return api("GET","/api/admin/plans"); },
  upsertPlan:function(body){ return api("PUT","/api/admin/plans",body); },
  deletePlan:function(code){ return api("DELETE","/api/admin/plans/"+encodeURIComponent(code)); },
  recentData:function(limit,page){ return api("GET","/api/admin/recent-data?limit="+(limit||10)+"&page="+(page||1)); },
  publicReceipt:function(uuid){ return api("GET","/api/public/receipt/"+encodeURIComponent(uuid)); },
  publicReceiptHistory:function(uuid){ return api("GET","/api/public/receipt/"+encodeURIComponent(uuid)+"/history"); }
};

/* ============================================================
   Owner active-branch context (mirrors the Flutter app's branch switch)
   ------------------------------------------------------------
   A single panel-wide "active branch". `id===""` means All branches
   (consolidated). Switching re-renders the current owner view scoped to that
   branch (home stats, every entity list, reports) ŌĆö not just one page.
   ============================================================ */
var ownerBranch = {
  id: (function(){ try { return localStorage.getItem("ownerBranchId")||""; } catch(e){ return ""; } })(),
  list: null,      // null = not loaded yet; [] = loaded/none; [{id,name}] otherwise
  loading: false
};
// branchId to pass to scoped endpoints ("" -> undefined so the param is omitted).
function ownerBranchParam(){ return ownerBranch.id || undefined; }
// Entities scoped by the active branch. accountants carry no data.branch_id but
// the backend resolves their branch via User.branchId (so we still send branchId
// for them); only the `branches` identity table itself is never branch-scoped.
function isBranchScopedEntity(entity){ return entity!=="branches"; }
// Load the owner's branches once; on first load (if >1) re-render so the
// switcher appears. Cached ŌĆö subsequent calls are no-ops.
function ensureOwnerBranches(){
  if(ownerBranch.list!==null || ownerBranch.loading) return;
  ownerBranch.loading=true;
  API.myData("branches",{page:1,limit:200}).then(function(res){
    ownerBranch.list=normalizeList(res,"records").map(function(r){
      var d=(r&&r.data)||{};
      return {id:d.id,name:(r&&r.label)||d.name||String(d.id||"")};
    }).filter(function(b){ return b.id!=null && b.id!==""; });
    ownerBranch.loading=false;
    // Stored branch removed on another device -> reset (re-defaulted below).
    if(ownerBranch.id && !ownerBranch.list.some(function(b){ return String(b.id)===String(ownerBranch.id); })) ownerBranch.id="";
    // No "all branches" view: always land on a SPECIFIC branch (the first one).
    if(!ownerBranch.id && ownerBranch.list.length>=1){
      ownerBranch.id=String(ownerBranch.list[0].id);
      try { localStorage.setItem("ownerBranchId",ownerBranch.id); } catch(e){}
    }
    if(ownerBranch.list.length>=1) render();   // reveal the switcher
  }).catch(function(){ ownerBranch.list=[]; ownerBranch.loading=false; });
}
function setOwnerBranch(id){
  ownerBranch.id=id||"";
  try { localStorage.setItem("ownerBranchId",ownerBranch.id); } catch(e){}
  render();   // re-route current hash -> active view re-fetches, branch-scoped
}
// The switcher bar shown in the owner shell. NO "all branches" option ŌĆö the
// owner is always viewing exactly one branch. Hidden only when there are none.
function ownerBranchBar(){
  if(!ownerBranch.list || ownerBranch.list.length<1) return null;
  var opts=[];
  ownerBranch.list.forEach(function(b){
    opts.push(el("option",{value:b.id,selected:(String(b.id)===String(ownerBranch.id))?"":false,text:b.name}));
  });
  var sel=el("select",{class:"app-branch-select",onchange:function(){ setOwnerBranch(this.value); }},opts);
  return el("div",{class:"app-branchbar"},[
    el("span",{class:"bb-ic"},[mi("account_tree")]),
    el("span",{class:"bb-lbl",text:"ž¦┘ä┘üž▒ž╣ ž¦┘äžŁž¦┘ä┘Ŗ"}),
    sel
  ]);
}

/* ============================================================
   Flash item 7: owner-panel BRANCH-ACCOUNT switcher. Branches are now separate
   sub-accounts (own login, isolated mirror). The owner picks "My account" or one
   of its branch accounts; the whole owner panel (home stats, every entity list,
   reports) then re-fetches from that branch ACCOUNT's mirror via the
   /api/account/branches/:id/* endpoints. id==="" -> the owner's own account.
   ============================================================ */
var acctBranch = {
  id: (function(){ try { return localStorage.getItem("acctBranchId")||""; } catch(e){ return ""; } })(),
  list:null, loading:false
};
function ensureBranchAccounts(){
  if(acctBranch.list!==null || acctBranch.loading) return;
  acctBranch.loading=true;
  API.branchAccounts().then(function(res){
    var arr=(res&&res.branches)||[];
    acctBranch.list=arr.map(function(b){ return {id:String(b.id),name:b.generatorName||b.name||b.phone||String(b.id),phone:b.phone||b.username||""}; });
    acctBranch.loading=false;
    // id==="" => the MAIN branch (the owner's own generator). It is shown in the
    // switcher as a NAMED entry (the generator name), NOT an "all branches" view.
    if(acctBranch.id && !acctBranch.list.some(function(b){ return b.id===acctBranch.id; })) acctBranch.id="";
    if(acctBranch.list.length>=1) render();   // reveal the switcher
  }).catch(function(){ acctBranch.list=[]; acctBranch.loading=false; });
}
function setAcctBranch(id){
  acctBranch.id=id||"";
  try { localStorage.setItem("acctBranchId",acctBranch.id); } catch(e){}
  render();
}
// Account-aware fetchers: route to the selected branch ACCOUNT's mirror, else
// the owner's own (preserving the legacy local-branch filter for own data).
// Branch-ACCOUNT selected -> that account's mirror. Else the MAIN branch (owner's
// own mirror): in the ACCOUNT model (branch accounts exist) the main is the FULL
// owner mirror; in the LEGACY model (local branches only) it carries the
// ownerBranch local-branch filter.
function _legacyBranchParam(){
  return (acctBranch.list && acctBranch.list.length) ? undefined : ownerBranchParam();
}
function acctStats(month,accountantId){
  return acctBranch.id ? API.branchStats(acctBranch.id,month,accountantId)
                       : API.myStats(month,accountantId,_legacyBranchParam());
}
function acctData(entity,opts){
  if(acctBranch.id) return API.branchData(acctBranch.id,entity,opts);
  var o=opts||{}, bid=_legacyBranchParam();
  if(bid && isBranchScopedEntity(entity)) o=Object.assign({},o,{branchId:bid});
  return API.myData(entity,o);
}
// The currently-selected branch {name, phone, kind} (account switcher first,
// then the legacy local-branch filter), or null when no branch is active. The
// account-branch carries its own phone; a legacy local branch has only a name.
function activeBranch(){
  if(acctBranch.id && acctBranch.list){
    var a=acctBranch.list.filter(function(b){ return b.id===acctBranch.id; })[0];
    if(a) return {name:a.name, phone:a.phone||"", kind:"account"};
  }
  if(ownerBranch.id && ownerBranch.list){
    var o=ownerBranch.list.filter(function(b){ return String(b.id)===String(ownerBranch.id); })[0];
    if(o) return {name:o.name, phone:"", kind:"local"};
  }
  return null;
}
function activeBranchName(){ var b=activeBranch(); return b?b.name:null; }
function acctBranchBar(){
  if(!acctBranch.list || acctBranch.list.length<1) return null;
  // First entry = the MAIN branch (the owner's own generator), named with the
  // ORIGINAL generator name (NOT "all branches" / NOT "Main Branch"); then each
  // branch account. id="" selects the main branch.
  var mainName=(state.me&&(state.me.generatorName||state.me.name))||"ž¦┘ä┘üž▒ž╣ ž¦┘äž▒ž”┘Ŗž│┘Ŗ";
  var opts=[el("option",{value:"",selected:(acctBranch.id==="")?"":false,text:mainName})];
  acctBranch.list.forEach(function(b){
    opts.push(el("option",{value:b.id,selected:(b.id===acctBranch.id)?"":false,text:b.name}));
  });
  var sel=el("select",{class:"app-branch-select",onchange:function(){ setAcctBranch(this.value); }},opts);
  return el("div",{class:"app-branchbar"},[
    el("span",{class:"bb-ic"},[mi("account_tree")]),
    el("span",{class:"bb-lbl",text:"ž¦┘ä┘üž▒ž╣"}),
    sel
  ]);
}

/* ============================================================
   Auth helpers
   ============================================================ */
function isAdmin(){ return !!(state.me&&state.me.role==="admin"); }
// Landing route per role: admins ŌåÆ admin dashboard, owners ŌåÆ "┘ä┘łžŁž¬┘Ŗ".
function homeHash(){ return isAdmin()?"#/dashboard":"#/my"; }
function setSession(token,me){
  state.token=token; state.me=me;
  localStorage.setItem(TOKEN_KEY,token);
  if(me) localStorage.setItem(ME_KEY,JSON.stringify(me));
  if(isAdmin()) connectEvents();   // the SSE feed is admin-only

  state.token=null; state.me=null;

  ownerBranch.list=null; ownerBranch.loading=false; ownerBranch.id="";

/* ============================================================
   Real-time events (SSE) ŌĆö new-account notifications
   Opens an EventSource to /api/admin/events once authenticated; shows a
   prominent popup (+ toast) when a new owner registers, and refreshes the
   Users list if it is the current route. Auto-reconnects on error.
   ============================================================ */
var _es=null;          // active EventSource (or null)
var _esRetry=null;     // pending reconnect timer
function connectEvents(){
  if(!state.token) return;
  if(!isAdmin()) return;                         // events feed is an admin-only endpoint
  if(typeof EventSource==="undefined") return;   // unsupported browser ŌåÆ silently skip
  disconnectEvents();
  var es;
  try{
    es=new EventSource(API_BASE+"/api/admin/events?token="+encodeURIComponent(state.token));
  }catch(e){ return; }
  _es=es;
  es.addEventListener("user_registered",function(e){
    var d=null; try{ d=JSON.parse(e.data); }catch(err){ d=null; }
    d=d||{};
    var name=d.name||d.username||"┘ģž│ž¬ž«ž»┘ģ ž¼ž»┘Ŗž»";
    var username=d.username||"";
    newAccountPopup(name,username);
    toast("žŁž│ž¦ž© ž¼ž»┘Ŗž»: "+name+(username?(" ("+username+")"):""),"ok");
    // If the Users list is open, refresh it so the new account appears live.
    if((location.hash||"")==="#/users"){ try{ viewUsers(); }catch(err){} }
  });
  es.onerror=function(){
    // EventSource auto-reconnects, but if the connection is fully closed (e.g.
    // token rejected) re-open it ourselves after a short delay while signed in.
    if(es.readyState===2){
      disconnectEvents();
      if(state.token){
        if(_esRetry) clearTimeout(_esRetry);
        _esRetry=setTimeout(function(){ if(state.token) connectEvents(); },4000);
      }
    }
  };
}
function disconnectEvents(){
  if(_esRetry){ clearTimeout(_esRetry); _esRetry=null; }
  if(_es){ try{ _es.close(); }catch(e){} _es=null; }
}

// True when the current hash maps to a public (no-login) route ŌĆö used so a
// stale token's background /me 401 never bounces a public page to login.
function currentRouteIsPublic(){
  var hash=location.hash||"";
  for(var i=0;i<routes.length;i++){ if(hash.match(routes[i].re)) return !!routes[i].public; }
  return false;
}
function render(){
  var hash=location.hash||"";
  if(!hash){ location.hash = state.token?homeHash():"#/login"; return; }
  var match=null,params=null;
  for(var i=0;i<routes.length;i++){
    var m=hash.match(routes[i].re);
    if(m){ match=routes[i]; params=m.slice(1).map(decodeURIComponent); break; }
  }
  if(!match){ location.hash = state.token?homeHash():"#/login"; return; }
  if(!match.public && !state.token){ location.hash="#/login"; return; }
  if(match.public && match.view===viewLogin && state.token){ location.hash=homeHash(); return; }
  // Role guards: owners can only reach the #/my* screens; admins use the admin area.
  if(!match.public){
    if(!match.owner && !isAdmin()){ location.hash="#/my"; return; }
    if(match.owner && isAdmin()){ location.hash="#/dashboard"; return; }
  }
  closeModal();
  closeOwnerSheet();
  match.view.apply(null,params||[]);
}

/* Prefetch {localId -> display name} maps for related entities (boards/circuits)
   so tables and statements show NAMES, never raw UUIDs.
   fetchFn(entity,opts) -> promise of the mirror endpoint (owner: API.myData,
   admin: API.userData bound to the user id). Failures degrade to empty maps. */
function loadNameMaps(fetchFn,entities){
  return Promise.all(entities.map(function(en){
    return fetchFn(en,{limit:200}).then(function(res){
      var m={};
      normalizeList(res,"records").forEach(function(r){
        var d=(r&&r.data)||{};
        var nm=d.name||d.code;
        if(nm==null||nm==="") return;
        if(r.localId!=null) m[r.localId]=nm;
        if(d.id!=null) m[d.id]=nm;
      });
      return m;
    }).catch(function(){ return {}; });
  })).then(function(arr){
    var out={};
    entities.forEach(function(en,i){ out[en]=arr[i]; });
    return out;
  });
}

/* Columns for one entity, with foreign-key ids resolved to names when resolver
   maps are provided. Returns a per-call copy for circuits so the shared
   SYNC_COLUMNS defs stay untouched for the other entities. */
function syncColumnsFor(entity,maps){
  var cols=SYNC_COLUMNS[entity];
  if(entity==="circuits"&&cols){
    var boards=(maps&&maps.boards)||{};
    cols=cols.map(function(c){
      if(c.label!=="ž¦┘ä┘ä┘łžŁž®") return c;
      return {label:c.label,get:function(d){
        // Board NAME via the prefetched map ŌĆö never the raw board_id.
        return syncText(d.board_id!=null?(boards[d.board_id]||null):null);
      }};
    });
  }
  if(entity==="settlements"&&cols){
    var accts=(maps&&maps.accountants)||{};
    cols=cols.map(function(c){
      if(c.label!=="ž¦┘ä┘ģžŁž¦ž│ž©") return c;
      return {label:c.label,get:function(d){
        // Accountant NAME via the prefetched map; fall back to the raw id.
        return syncText(d.accountant_id!=null?(accts[d.accountant_id]||d.accountant_id):null);
      }};
    });
  }
  return cols;
}

/* Plan banner text like the app: planCode_Ndays (days left from expiresAt),
   e.g. MONTHLY_29days, or planCode_expired once past the expiry date. */
function planRemainingText(sub){
  sub=sub||{};
  var code=sub.planCode;
  if(!code) return "┘äž¦ ž¬┘łž¼ž» ž«žĘž®";
  var exp=sub.expiresAt?new Date(sub.expiresAt):null;
  if(!exp||isNaN(exp.getTime())) return code;
  var days=Math.ceil((exp.getTime()-Date.now())/86400000);
  return days>0?(code+"_"+days+"days"):(code+"_expired");
}

/* ---------- owner monthly reports (#/my/reports) ----------
   Gauges/charts + totals for a picked month, all derived from the
   month-aware /api/account/stats dashboard object (no new tables). */
function repMonthNow(){
  var d=new Date();
  return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2);
}
function repMonthShift(month,delta){
  var p=/^(\d{4})-(\d{2})$/.exec(month||"");
  var d=p?new Date(Number(p[1]),Number(p[2])-1+delta,1):new Date();
  return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2);
}

/* Semi-circular gauge (inline SVG): grey track + value arc + % in the middle. */
function repGauge(rate,label){
  rate=Math.min(1,Math.max(0,repNum(rate)));
  var r=70,cx=90,cy=92,sw=16,len=Math.PI*r;
  var arc="M "+(cx-r)+" "+cy+" A "+r+" "+r+" 0 0 1 "+(cx+r)+" "+cy;
  var svg='<svg viewBox="0 0 180 104" width="210" height="121" aria-hidden="true">'+
    '<path d="'+arc+'" fill="none" stroke="#e4e9f0" stroke-width="'+sw+'" stroke-linecap="round"/>';
  if(rate>0){
    svg+='<path d="'+arc+'" fill="none" stroke="#1565C0" stroke-width="'+sw+'" stroke-linecap="round"'+
      ' stroke-dasharray="'+(rate*len).toFixed(1)+' '+(len+sw).toFixed(1)+'"/>';
  }
  svg+='<text x="'+cx+'" y="'+(cy-10)+'" text-anchor="middle" font-size="28" font-weight="800" fill="#1565C0">'+
    Math.round(rate*100)+'%</text></svg>';
  return el("div",{class:"rep-center"},[
    el("div",{html:svg}),
    el("div",{class:"rep-chart-lbl",text:label})
  ]);

/* Donut (SVG stroke-dasharray): paid green vs unpaid red, total in the center. */
function repDonut(paid,unpaid,total){
  paid=Math.max(0,repNum(paid)); unpaid=Math.max(0,repNum(unpaid));
  var r=40,c=2*Math.PI*r,sum=paid+unpaid;
  var svg='<svg viewBox="0 0 120 120" width="150" height="150" aria-hidden="true">'+
    '<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="#e4e9f0" stroke-width="18"/>';
  if(sum>0){
    var pf=paid/sum*c;
    if(paid>0) svg+='<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="#2e7d32" stroke-width="18"'+
      ' stroke-dasharray="'+pf.toFixed(2)+' '+c.toFixed(2)+'" transform="rotate(-90 60 60)"/>';
    if(unpaid>0) svg+='<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="#e53935" stroke-width="18"'+
      ' stroke-dasharray="'+(unpaid/sum*c).toFixed(2)+' '+c.toFixed(2)+'" stroke-dashoffset="'+(-pf).toFixed(2)+'"'+
      ' transform="rotate(-90 60 60)"/>';
  }

      el("span",[el("span",{class:"dot2",style:"background:#e53935"}),"ž║┘Ŗž▒ ┘ģž│ž»ž»: "+unpaid])

function normalizeList(res,key){
  if(!res) return [];
  if(Array.isArray(res)) return res;

}

/* ============================================================
   Boot
   ============================================================ */
function boot(){
  // Validate existing token against /me so a stale token doesn't show a broken UI.
  if(state.token && (!location.hash || location.hash==="#/login")){
    location.hash=homeHash();
  }
  render();
  if(state.token && !currentRouteIsPublic()){
    if(isAdmin()) connectEvents();   // real-time notifications (admin sessions only)
    API.me().then(function(res){
      var acc=(res&&res.account)||res;
      if(acc){
        setSession(state.token,acc);   // owners are allowed; role kept in state.me
        // Re-route if the refreshed role doesn't match the current area.
        if(!currentRouteIsPublic()){
          var ownerArea=/^#\/my(\/|$)/.test(location.hash||"");
          if(isAdmin() && ownerArea) location.hash="#/dashboard";
          else if(!isAdmin() && !ownerArea) location.hash="#/my";
        }
      }
    }).catch(function(){ /* 401 handled inside api() */ });
  }
}
boot();

/* expose a couple of helpers for debugging */
window.__moldatiAdmin={state:state,API:API};
