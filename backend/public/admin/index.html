<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="light" />
<title>لوحة تحكم مولدتي</title>
<style>
  :root{
    --primary:#1565C0;
    --primary-dark:#0d47a1;
    --primary-light:#e3f0fc;
    --bg:#f4f6fa;
    --surface:#ffffff;
    --border:#e2e6ee;
    --text:#1f2733;
    --muted:#69748a;
    --danger:#d32f2f;
    --danger-light:#fdecec;
    --success:#2e7d32;
    --success-light:#e8f5e9;
    --warn:#ed6c02;
    --warn-light:#fff4e5;
    --radius:12px;
    --shadow:0 1px 3px rgba(16,24,40,.08),0 1px 2px rgba(16,24,40,.04);
    --shadow-lg:0 12px 32px rgba(16,24,40,.18);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Segoe UI","Tahoma","Cairo",-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--primary);text-decoration:none}
  a:hover{text-decoration:underline}
  button{font-family:inherit;font-size:14px;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}

  /* ---------- buttons ---------- */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    padding:9px 16px;border-radius:9px;border:1px solid transparent;
    background:var(--primary);color:#fff;font-weight:600;transition:.15s;white-space:nowrap;
  }
  .btn:hover{background:var(--primary-dark)}
  .btn:disabled{opacity:.55;cursor:not-allowed}
  .btn.sm{padding:6px 11px;font-size:13px;border-radius:7px}
  .btn.ghost{background:transparent;color:var(--primary);border-color:var(--border)}
  .btn.ghost:hover{background:var(--primary-light)}
  .btn.danger{background:var(--danger)}
  .btn.danger:hover{background:#b71c1c}
  .btn.danger.ghost{background:transparent;color:var(--danger);border-color:#f3c6c6}
  .btn.danger.ghost:hover{background:var(--danger-light)}
  .btn.success{background:var(--success)}
  .btn.success:hover{background:#1b5e20}
  .btn.warn{background:var(--warn)}
  .btn.warn:hover{background:#c65a00}
  .btn.neutral{background:#eef1f6;color:var(--text);border-color:var(--border)}
  .btn.neutral:hover{background:#e3e8f0}

  /* ---------- form ---------- */
  label{display:block;font-weight:600;margin-bottom:6px;font-size:13px;color:var(--text)}
  .field{margin-bottom:16px}
  .input,select.input,textarea.input{
    width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:9px;
    background:#fff;color:var(--text);transition:.15s;outline:none;
  }
  .input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
  textarea.input{resize:vertical;min-height:70px}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .row>.field{flex:1;min-width:160px}
  .check{display:flex;align-items:center;gap:8px;font-weight:600;cursor:pointer}
  .check input{width:16px;height:16px;cursor:pointer}

  /* ---------- layout (RTL vertical sidebar on the right) ---------- */
  .sidebar{
    position:fixed;top:0;right:0;bottom:0;z-index:50;width:248px;
    background:var(--primary);color:#fff;display:flex;flex-direction:column;
    box-shadow:var(--shadow);
  }
  .sidebar .brand{
    font-weight:800;font-size:18px;letter-spacing:.3px;display:flex;align-items:center;gap:10px;
    padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.14);
  }
  .sidebar .brand .logo{
    width:30px;height:30px;border-radius:8px;background:#fff;color:var(--primary);
    display:grid;place-items:center;font-weight:900;font-size:16px;
  }
  .sidebar nav{display:flex;flex-direction:column;gap:4px;padding:14px 12px;flex:1;overflow-y:auto}
  .sidebar nav a{
    color:#e8f0fb;padding:11px 14px;border-radius:9px;font-weight:600;font-size:14.5px;
    display:flex;align-items:center;gap:9px;
  }
  .sidebar nav a:hover{background:rgba(255,255,255,.14);text-decoration:none}
  .sidebar nav a.active{background:#fff;color:var(--primary)}
  .sidebar .foot{
    border-top:1px solid rgba(255,255,255,.14);padding:14px 16px;display:flex;flex-direction:column;gap:10px;
  }
  .sidebar .foot .who{font-size:13.5px;color:#eef4fd;font-weight:600;word-break:break-word}
  .sidebar .logout{
    background:rgba(255,255,255,.16);border:none;color:#fff;padding:9px 13px;border-radius:8px;font-weight:600;text-align:center;
  }
  .sidebar .logout:hover{background:rgba(255,255,255,.28)}

  .wrap{max-width:1080px;margin:0 auto;padding:24px 20px 60px;margin-right:248px}
  @media(max-width:760px){
    .sidebar{position:static;width:100%;flex-direction:column}
    .sidebar nav{flex-direction:row;flex-wrap:wrap;overflow-x:auto}
    .sidebar nav a{padding:8px 12px}
    .sidebar .foot{flex-direction:row;align-items:center;justify-content:space-between}
    .wrap{margin-right:0}
  }
  .page-head{display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap}
  .page-head h1{font-size:22px;margin:0;font-weight:700;flex:1}
  .crumb{color:var(--muted);font-size:13px;margin-bottom:6px}
  .crumb a{font-weight:600}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:18px}
  .card .card-h{padding:15px 18px;border-bottom:1px solid var(--border);font-weight:700;font-size:15px;display:flex;align-items:center;gap:10px}
  .card .card-h .sub{font-weight:500;color:var(--muted);font-size:13px}
  .card .card-b{padding:18px}
  .card .card-b.flush{padding:0}

  /* ---------- stats ---------- */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:8px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;position:relative;overflow:hidden}
  .stat .lbl{color:var(--muted);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .stat .val{font-size:34px;font-weight:800;margin-top:6px;color:var(--primary)}
  .stat .ic{position:absolute;left:14px;top:14px;width:40px;height:40px;border-radius:11px;background:var(--primary-light);display:grid;place-items:center;font-size:20px}

  /* ---------- table ---------- */
  .tbl-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse}
  th,td{padding:12px 16px;text-align:right;border-bottom:1px solid var(--border);vertical-align:middle}
  th{font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700;background:#fafbfd}
  tbody tr:hover{background:#fafbff}
  tbody tr:last-child td{border-bottom:none}
  td .acts{display:flex;gap:7px;flex-wrap:wrap}

  /* ---------- badges ---------- */
  .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700;line-height:1.6}
  .badge.green{background:var(--success-light);color:var(--success)}
  .badge.red{background:var(--danger-light);color:var(--danger)}
  .badge.orange{background:var(--warn-light);color:var(--warn)}
  .badge.blue{background:var(--primary-light);color:var(--primary)}
  .badge.gray{background:#eef1f6;color:var(--muted)}
  .badge .dot{width:7px;height:7px;border-radius:50%;background:currentColor}

  /* ---------- detail grid ---------- */
  .kv{display:grid;grid-template-columns:160px 1fr;gap:10px 18px}
  .kv .k{color:var(--muted);font-weight:600}
  .kv .v{font-weight:600;word-break:break-word}
  @media(max-width:560px){.kv{grid-template-columns:1fr;gap:2px 0}.kv .k{margin-top:8px}}

  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .toolbar .grow{flex:1}
  .search{position:relative;flex:1;min-width:200px;max-width:340px}
  .search input{padding-right:36px}
  .search .ic{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--muted)}

  .empty{padding:48px 20px;text-align:center;color:var(--muted)}
  .empty .big{font-size:40px;margin-bottom:8px;opacity:.6}

  /* ---------- spinner ---------- */
  .spin{width:18px;height:18px;border:2.5px solid rgba(21,101,192,.25);border-top-color:var(--primary);border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
  .spin.white{border-color:rgba(255,255,255,.4);border-top-color:#fff}
  .spin.lg{width:34px;height:34px;border-width:3.5px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .loading-box{display:flex;flex-direction:column;align-items:center;gap:12px;padding:54px 20px;color:var(--muted)}

  /* ---------- login ---------- */
  .login-screen{min-height:100vh;display:grid;place-items:center;padding:24px;
    background:linear-gradient(135deg,#1565C0 0%,#0d47a1 100%);}
  .login-card{width:100%;max-width:380px;background:#fff;border-radius:16px;box-shadow:var(--shadow-lg);padding:32px 30px}
  .login-card .logo-big{width:56px;height:56px;border-radius:14px;background:var(--primary);color:#fff;display:grid;place-items:center;font-weight:900;font-size:26px;margin:0 auto 16px}
  .login-card h2{text-align:center;margin:0 0 4px;font-size:22px}
  .login-card .tag{text-align:center;color:var(--muted);margin:0 0 24px;font-size:13px}
  .login-card .btn{width:100%;padding:12px;font-size:15px}

  /* ---------- public receipt (standalone, no sidebar) ---------- */
  .receipt-screen{min-height:100vh;display:grid;place-items:center;padding:24px;
    background:#fff;}
  .receipt-card{width:100%;max-width:430px;background:#fff;border-radius:16px;box-shadow:var(--shadow-lg);overflow:hidden}
  .receipt-card .r-head{background:var(--primary);color:#fff;text-align:center;padding:22px 22px 18px}
  .receipt-card .r-head .gen{font-size:21px;font-weight:800;margin:0}
  .receipt-card .r-head .tag{font-size:13px;opacity:.92;margin:6px 0 0}
  .receipt-card .r-no{text-align:center;font-size:17px;font-weight:800;color:var(--primary);padding:16px 22px 4px}
  .receipt-card .r-body{padding:8px 22px 22px}
  .receipt-card .r-line{display:flex;justify-content:space-between;gap:14px;padding:11px 0;border-bottom:1px dashed var(--border)}
  .receipt-card .r-line:last-child{border-bottom:none}
  .receipt-card .r-line .k{color:var(--muted);font-weight:600}
  .receipt-card .r-line .v{font-weight:700;text-align:left}
  .receipt-card .r-empty{padding:40px 22px;text-align:center;color:var(--muted)}
  .receipt-card .r-empty .big{font-size:46px;margin-bottom:10px;opacity:.6}

  /* ---------- toast ---------- */
  #toasts{position:fixed;left:18px;bottom:18px;z-index:1000;display:flex;flex-direction:column;gap:10px;max-width:340px}
  .toast{background:#222b3a;color:#fff;padding:13px 16px;border-radius:10px;box-shadow:var(--shadow-lg);font-weight:600;font-size:13px;display:flex;gap:10px;align-items:flex-start;animation:slidein .25s ease}
  .toast.ok{background:#1b5e20}
  .toast.err{background:#b71c1c}
  .toast .x{margin-right:auto;cursor:pointer;opacity:.8;font-weight:800}
  @keyframes slidein{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}

  /* ---------- new-account popup (real-time SSE) ---------- */
  #popups{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:1100;display:flex;flex-direction:column;gap:12px;width:min(420px,calc(100vw - 36px));pointer-events:none}
  .popup{
    pointer-events:auto;background:#fff;border:1px solid var(--border);border-right:5px solid var(--success);
    border-radius:14px;box-shadow:var(--shadow-lg);padding:16px 18px;display:flex;gap:14px;align-items:flex-start;
    animation:popdrop .3s cubic-bezier(.2,.9,.3,1.4);
  }
  .popup .pic{width:44px;height:44px;border-radius:12px;background:var(--success-light);color:var(--success);display:grid;place-items:center;font-size:24px;flex-shrink:0}
  .popup .ptxt{flex:1;min-width:0}
  .popup .ptitle{font-weight:800;font-size:15px;color:var(--text);margin-bottom:3px}
  .popup .pname{font-weight:700;color:var(--success);word-break:break-word}
  .popup .psub{color:var(--muted);font-size:13px;margin-top:2px;word-break:break-word}
  .popup .x{background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;line-height:1;align-self:flex-start;padding:0 2px}
  @keyframes popdrop{from{transform:translateY(-26px) scale(.96);opacity:0}to{transform:none;opacity:1}}

  /* ---------- modal ---------- */
  .modal-back{position:fixed;inset:0;background:rgba(16,24,40,.5);z-index:500;display:grid;place-items:center;padding:20px;animation:fade .15s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:#fff;border-radius:14px;box-shadow:var(--shadow-lg);width:100%;max-width:440px;max-height:90vh;overflow:auto;animation:pop .18s}
  .modal.wide{max-width:560px}
  @keyframes pop{from{transform:translateY(12px) scale(.98);opacity:0}to{transform:none;opacity:1}}
  .modal .m-h{padding:18px 20px;border-bottom:1px solid var(--border);font-weight:700;font-size:17px;display:flex;align-items:center}
  .modal .m-h .x{margin-right:auto;background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;line-height:1}
  .modal .m-b{padding:20px}
  .modal .m-f{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
  .alert{padding:11px 14px;border-radius:9px;font-size:13px;font-weight:600;margin-bottom:14px}
  .alert.err{background:var(--danger-light);color:var(--danger)}
  .alert.info{background:var(--primary-light);color:var(--primary-dark)}

  .muted{color:var(--muted)}
  .nowrap{white-space:nowrap}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12.5px;direction:ltr;text-align:right;unicode-bidi:plaintext}
  .right{text-align:left}
  td.right .acts{justify-content:flex-end}
  .mt0{margin-top:0}.mb0{margin-bottom:0}
  hr.sep{border:none;border-top:1px solid var(--border);margin:18px 0}
  .pill-actions{display:flex;gap:8px;flex-wrap:wrap}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>
<div id="toasts"></div>
<div id="popups"></div>

<script>
(function(){
"use strict";

/* ============================================================
   Config / state
   ============================================================ */
var TOKEN_KEY = "moldati_admin_token";
var ME_KEY    = "moldati_admin_me";
var API_BASE  = ""; // same origin

var state = {
  token: localStorage.getItem(TOKEN_KEY) || null,
  me: safeParse(localStorage.getItem(ME_KEY))
};

function safeParse(s){ try{ return s ? JSON.parse(s) : null; }catch(e){ return null; } }

/* ============================================================
   Small DOM helpers
   ============================================================ */
function $(sel,root){ return (root||document).querySelector(sel); }
function el(tag,attrs,children){
  var n=document.createElement(tag);
  // Support the 2-arg form el(tag, childrenArray): if `attrs` is an array it is
  // really the children list (no attributes), e.g. el("tr",[td,td]).
  if(Array.isArray(attrs)){ children=attrs; attrs=null; }
  if(attrs){
    for(var k in attrs){
      if(k==="class") n.className=attrs[k];
      else if(k==="html") n.innerHTML=attrs[k];
      else if(k==="text") n.textContent=attrs[k];
      else if(k.slice(0,2)==="on" && typeof attrs[k]==="function") n.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
      else if(attrs[k]!==null && attrs[k]!==undefined && attrs[k]!==false) n.setAttribute(k,attrs[k]);
    }
  }
  if(children!=null) appendChildren(n,children);
  return n;
}
function appendChildren(n,children){
  (Array.isArray(children)?children:[children]).forEach(function(c){
    if(c==null||c===false) return;
    if(Array.isArray(c)){ appendChildren(n,c); return; } // flatten nested arrays (e.g. kv())
    n.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  });
}
function esc(s){
  if(s==null) return "";
  return String(s).replace(/[&<>"']/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
  });
}
function clear(n){ while(n.firstChild) n.removeChild(n.firstChild); }

/* ============================================================
   Toast
   ============================================================ */
function toast(msg,type){
  var t=el("div",{class:"toast "+(type||"")},[
    el("span",{text:msg}),
    el("span",{class:"x",text:"×",onclick:function(){ remove(); }})
  ]);
  $("#toasts").appendChild(t);
  var to=setTimeout(remove,4200);
  function remove(){ clearTimeout(to); if(t.parentNode) t.parentNode.removeChild(t); }
}

/* Prominent real-time popup for a newly-registered account (auto-dismiss). */
function newAccountPopup(name,username){
  var root=$("#popups"); if(!root) return;
  var p=el("div",{class:"popup"},[
    el("div",{class:"pic",text:"🎉"}),
    el("div",{class:"ptxt"},[
      el("div",{class:"ptitle",text:"حساب جديد"}),
      el("div",{class:"pname",text:(name||username||"مستخدم جديد")}),
      username?el("div",{class:"psub",text:"اسم المستخدم: "+username}):null
    ]),
    el("button",{class:"x",text:"×",onclick:function(){ remove(); }})
  ]);
  root.appendChild(p);
  var to=setTimeout(remove,7000);
  function remove(){ clearTimeout(to); if(p.parentNode) p.parentNode.removeChild(p); }
}

/* ============================================================
   Formatting helpers
   ============================================================ */
function fmtDate(iso){
  if(!iso) return "—";
  var d=new Date(iso); if(isNaN(d)) return esc(iso);
  return d.toLocaleString(undefined,{year:"numeric",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});
}
function fmtDateShort(iso){
  if(!iso) return "—";
  var d=new Date(iso); if(isNaN(d)) return esc(iso);
  return d.toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"});
}
function fmtPrice(p){
  if(p==null||p==="") return "—";
  var n=Number(p); if(isNaN(n)) return esc(p);
  try{ return new Intl.NumberFormat().format(n)+" د.ع"; }catch(e){ return n+" د.ع"; }
}
function statusBadge(status){
  var map={
    active:["green","نشط"], pending:["orange","قيد الانتظار"],
    rejected:["red","مرفوض"], expired:["gray","منتهٍ"], none:["gray","لا يوجد"]
  };
  var m=map[status]||["gray",status||"لا يوجد"];
  return el("span",{class:"badge "+m[0]},[el("span",{class:"dot"}),m[1]]);
}
function roleBadge(role){
  if(role==="admin") return el("span",{class:"badge blue"},["مدير"]);
  return el("span",{class:"badge gray"},["مالك"]);
}
function blockedBadge(blocked){
  return blocked
    ? el("span",{class:"badge red"},[el("span",{class:"dot"}),"محظور"])
    : el("span",{class:"badge green"},[el("span",{class:"dot"}),"نشط"]);
}

/* ============================================================
   API layer
   ============================================================ */
function ApiError(message,status,code){ this.message=message; this.status=status; this.code=code; }
ApiError.prototype=Object.create(Error.prototype);

function api(method,path,body,isForm){
  var opts={method:method,headers:{}};
  if(state.token) opts.headers["Authorization"]="Bearer "+state.token;
  if(body!=null && !isForm){
    opts.headers["Content-Type"]="application/json";
    opts.body=JSON.stringify(body);
  } else if(isForm){
    opts.body=body;
  }
  return fetch(API_BASE+path,opts).then(function(res){
    if(res.status===401){
      // session expired -> back to login, but never bounce a public page.
      if(!currentRouteIsPublic()) doLogout(true);
      throw new ApiError("انتهت الجلسة. يرجى تسجيل الدخول مرة أخرى.",401);
    }
    var ct=res.headers.get("content-type")||"";
    var pj = ct.indexOf("application/json")>=0 ? res.json().catch(function(){return null;}) : Promise.resolve(null);
    return pj.then(function(data){
      if(!res.ok){
        var msg=(data&&data.message)||("Request failed ("+res.status+")");
        throw new ApiError(msg,res.status,data&&data.code);
      }
      return data;
    });
  },function(netErr){
    if(netErr instanceof ApiError) throw netErr;
    throw new ApiError("خطأ في الشبكة — تعذّر الوصول إلى الخادم.",0);
  });
}
// Shared query-string builder for the synced-data endpoints (admin + owner).
function syncDataQuery(entity,opts){
  opts=opts||{};
  var q="?entity="+encodeURIComponent(entity);
  if(opts.q) q+="&q="+encodeURIComponent(opts.q);
  if(opts.page) q+="&page="+encodeURIComponent(opts.page);
  if(opts.limit) q+="&limit="+encodeURIComponent(opts.limit);
  if(opts.localId) q+="&localId="+encodeURIComponent(opts.localId);
  if(opts.includeDeleted) q+="&includeDeleted=true";
  if(opts.relField&&opts.relValue){ q+="&relField="+encodeURIComponent(opts.relField)+"&relValue="+encodeURIComponent(opts.relValue); }
  return q;
}
var API={
  login:function(username,password){ return api("POST","/api/auth/login",{username:username,password:password}); },
  me:function(){ return api("GET","/api/auth/me"); },
  // Owner self-service: the signed-in account's own stats + mirrored data.
  myStats:function(){ return api("GET","/api/account/stats"); },
  myData:function(entity,opts){ return api("GET","/api/account/data"+syncDataQuery(entity,opts)); },
  myRecent:function(limit,page){ return api("GET","/api/account/recent?limit="+(limit||10)+"&page="+(page||1)); },
  users:function(){ return api("GET","/api/admin/users"); },

/* ============================================================
   Auth helpers
   ============================================================ */
function isAdmin(){ return !!(state.me&&state.me.role==="admin"); }
// Landing route per role: admins → admin dashboard, owners → "لوحتي".
function homeHash(){ return isAdmin()?"#/dashboard":"#/my"; }
function setSession(token,me){
  state.token=token; state.me=me;
  localStorage.setItem(TOKEN_KEY,token);
  if(me) localStorage.setItem(ME_KEY,JSON.stringify(me));
  if(isAdmin()) connectEvents();   // the SSE feed is admin-only
  else disconnectEvents();
}
function doLogout(silent){
  state.token=null; state.me=null;
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(ME_KEY);
  disconnectEvents();
  if(!silent) toast("تم تسجيل الخروج","ok");
  if(location.hash!=="#/login") location.hash="#/login";
  else render();
}

/* ============================================================
   Real-time events (SSE) — new-account notifications
   Opens an EventSource to /api/admin/events once authenticated; shows a
   prominent popup (+ toast) when a new owner registers, and refreshes the
   Users list if it is the current route. Auto-reconnects on error.
   ============================================================ */
var _es=null;          // active EventSource (or null)
var _esRetry=null;     // pending reconnect timer
function connectEvents(){
  if(!state.token) return;
  if(!isAdmin()) return;                         // events feed is an admin-only endpoint
  if(typeof EventSource==="undefined") return;   // unsupported browser → silently skip
  disconnectEvents();
  var es;
  try{
    es=new EventSource(API_BASE+"/api/admin/events?token="+encodeURIComponent(state.token));
  }catch(e){ return; }
  _es=es;
  es.addEventListener("user_registered",function(e){
    var d=null; try{ d=JSON.parse(e.data); }catch(err){ d=null; }
    d=d||{};
    var name=d.name||d.username||"مستخدم جديد";
    var username=d.username||"";
    newAccountPopup(name,username);
    toast("حساب جديد: "+name+(username?(" ("+username+")"):""),"ok");
    // If the Users list is open, refresh it so the new account appears live.
    if((location.hash||"")==="#/users"){ try{ viewUsers(); }catch(err){} }
  });
  es.onerror=function(){
    // EventSource auto-reconnects, but if the connection is fully closed (e.g.
    // token rejected) re-open it ourselves after a short delay while signed in.
    if(es.readyState===2){
      disconnectEvents();
      if(state.token){
        if(_esRetry) clearTimeout(_esRetry);
        _esRetry=setTimeout(function(){ if(state.token) connectEvents(); },4000);
      }
    }
  };
}
function disconnectEvents(){
  if(_esRetry){ clearTimeout(_esRetry); _esRetry=null; }
  if(_es){ try{ _es.close(); }catch(e){} _es=null; }
}

function modal(opts){
  closeModal();
  var root=$("#modal-root");
  var back=el("div",{class:"modal-back",onclick:function(e){ if(e.target===back && opts.dismissable!==false) closeModal(); }});
  var box=el("div",{class:"modal"+(opts.wide?" wide":"")});
  box.appendChild(el("div",{class:"m-h"},[
    el("span",{text:opts.title||""}),
    el("button",{class:"x",text:"×",onclick:closeModal})

  if(opts.footer){
    var f=el("div",{class:"m-f"});
    opts.footer.forEach(function(b){ f.appendChild(b); });
    box.appendChild(f);
  }
  back.appendChild(box);

function confirmModal(opts){
  return new Promise(function(resolve){
    var btn=el("button",{class:"btn "+(opts.danger?"danger":""),text:opts.confirmText||"تأكيد",onclick:function(){
      btn.disabled=true; btn.appendChild(el("span",{class:"spin white",style:"margin-left:8px"}));

        el("div",{html:opts.message||""})

var routes=[
  {re:/^#\/login$/, view:viewLogin, public:true},
  {re:/^#\/r\/([^\/]+)\/history$/, view:viewPublicReceiptHistory, public:true},
  {re:/^#\/r\/([^\/]+)$/, view:viewPublicReceipt, public:true},
  // Owner self-service area (#/my…) — the signed-in owner's own data only.
  {re:/^#\/my$/, view:viewMyDashboard, owner:true},
  {re:/^#\/my\/data\/receipts\/detail\/([^\/]+)$/, view:viewMyReceiptDetail, owner:true},
  {re:/^#\/my\/data\/([^\/]+)\/by\/([^\/]+)\/([^\/]+)$/, view:viewMyEntity, owner:true},
  {re:/^#\/my\/data\/([^\/]+)$/, view:viewMyEntity, owner:true},
  {re:/^#\/my\/sub\/([^\/]+)$/, view:viewMyStatement, owner:true},
  {re:/^#\/dashboard$/, view:viewDashboard},
  {re:/^#\/users$/, view:viewUsers},
  {re:/^#\/users\/([^\/]+)\/data\/receipts\/detail\/([^\/]+)$/, view:viewReceiptDetail},
  {re:/^#\/users\/([^\/]+)\/data\/([^\/]+)\/by\/([^\/]+)\/([^\/]+)$/, view:viewUserEntity},
  {re:/^#\/users\/([^\/]+)\/data\/([^\/]+)$/, view:viewUserEntity},
  {re:/^#\/users\/([^\/]+)\/sub\/([^\/]+)$/, view:viewUserStatement},
  {re:/^#\/users\/([^\/]+)$/, view:viewUserDetail},
  {re:/^#\/plans$/, view:viewPlans}
];
// True when the current hash maps to a public (no-login) route — used so a
// stale token's background /me 401 never bounces a public page to login.
function currentRouteIsPublic(){
  var hash=location.hash||"";
  for(var i=0;i<routes.length;i++){ if(hash.match(routes[i].re)) return !!routes[i].public; }
  return false;
}
function render(){
  var hash=location.hash||"";
  if(!hash){ location.hash = state.token?homeHash():"#/login"; return; }
  var match=null,params=null;
  for(var i=0;i<routes.length;i++){
    var m=hash.match(routes[i].re);
    if(m){ match=routes[i]; params=m.slice(1).map(decodeURIComponent); break; }
  }
  if(!match){ location.hash = state.token?homeHash():"#/login"; return; }
  if(!match.public && !state.token){ location.hash="#/login"; return; }
  if(match.public && match.view===viewLogin && state.token){ location.hash=homeHash(); return; }
  // Role guards: owners can only reach the #/my* screens; admins use the admin area.
  if(!match.public){
    if(!match.owner && !isAdmin()){ location.hash="#/my"; return; }
    if(match.owner && isAdmin()){ location.hash="#/dashboard"; return; }
  }
  closeModal();
  match.view.apply(null,params||[]);
}
window.addEventListener("hashchange",render);

// kv()/kvNode() each return an array of two nodes ([key, value]); el() flattens nested arrays.

/* Paginated "آخر البيانات المرفوعة من التطبيق" card, shared by the admin
   dashboard (ownerCol:true, cross-account) and the owner home (own data).
   fetchFn(limit,page) -> { items, total, page, limit }. */
var RECENT_PAGE_LIMIT=10;
function recentUploadsCard(fetchFn,opts){
  opts=opts||{};
  var card=el("div",{class:"card"});
  var subEl=el("span",{class:"sub",text:""});
  card.appendChild(el("div",{class:"card-h"},[
    el("span",{text:"آخر البيانات المرفوعة من التطبيق"}),subEl
  ]));
  var body=el("div",{class:"card-b flush"});
  card.appendChild(body);
  var page=1;

  function load(){
    clear(body);
    body.appendChild(el("div",{style:"padding:14px"},[loadingBlock("جارٍ التحميل…")]));
    fetchFn(RECENT_PAGE_LIMIT,page).then(function(res){
      var items=(res&&res.items)||[];
      var total=(res&&res.total!=null)?res.total:items.length;
      var pages=Math.max(1,Math.ceil(total/RECENT_PAGE_LIMIT));
      subEl.textContent=total?(total+" عنصر"):"";
      clear(body);
      if(!items.length){
        body.appendChild(el("div",{class:"empty",text:"لا توجد بيانات مرفوعة بعد."}));
        return;
      }
      var tw=el("div",{class:"tbl-wrap"});
      var tbl=el("table");
      var headCells=[th("الوقت")];
      if(opts.ownerCol) headCells.push(th("المالك"));
      headCells.push(th("النوع"),th("العنصر"),th(""));
      tbl.appendChild(el("thead",[el("tr",headCells)]));
      var tb=el("tbody");
      items.forEach(function(it){
        var cells=[el("td",{class:"muted",text:fmtDate(it.updatedAt)})];
        if(opts.ownerCol){
          var ownerTxt=(it.userName||"—")+(it.generatorName?(" — "+it.generatorName):"");
          cells.push(el("td",[el("a",{href:"#/users/"+it.userId,text:ownerTxt})]));
        }
        cells.push(
          el("td",[el("span",{class:"badge blue",text:ownerEntityLabel(it.entity)})]),
          el("td",{text:it.label||it.localId||"—"}),
          el("td",{class:"right"},[el("a",{class:"btn sm ghost",href:opts.targetFor(it),text:"عرض"})])
        );
        tb.appendChild(el("tr",cells));
      });
      tbl.appendChild(tb); tw.appendChild(tbl); body.appendChild(tw);
      if(pages>1){
        body.appendChild(el("div",{class:"toolbar",style:"justify-content:center;margin:6px 0 10px"},[
          el("button",{class:"btn neutral sm",disabled:page<=1?"":false,onclick:function(){ if(page>1){ page--; load(); } }},["السابق ›"]),
          el("span",{class:"muted",style:"min-width:120px;text-align:center",text:"صفحة "+page+" / "+pages}),
          el("button",{class:"btn neutral sm",disabled:page>=pages?"":false,onclick:function(){ if(page<pages){ page++; load(); } }},["‹ التالي"])
        ]));
      }
    }).catch(function(err){
      clear(body);
      body.appendChild(el("div",{class:"empty",text:err.message||"تعذّر التحميل."}));
    });
  }
  load();
  return card;
}

/* Shared renderer: a card/table of a user's synced records for one entity.
   `onDelete(record)` adds a trailing per-row Delete (danger ghost) action. */
function renderSyncTable(entity,records,onDelete,drill){
  if(!records.length){
    return el("div",{class:"card"},[el("div",{class:"card-b"},[
      el("div",{class:"empty"},[el("div",{class:"big",text:"🗂️"}),"لا توجد بيانات ("+entityLabel(entity)+") متزامنة بعد."])
    ])]);
  }
  var hasActions=!!(onDelete||drill);
  function actionsCell(r){
    var btns=[];
    if(drill) btns.push(el("button",{class:"btn sm ghost",onclick:function(){ drill.onClick(r); }},["‹ "+drill.label]));
    if(onDelete) btns.push(el("button",{class:"btn sm danger ghost",onclick:function(){ onDelete(r); }},["حذف"]));
    return el("td",{class:"right"},[el("div",{class:"acts"},btns)]);
  }
  var cols=SYNC_COLUMNS[entity];
  var tw=el("div",{class:"tbl-wrap"});
  var tbl=el("table");
  var tb=el("tbody");
  if(cols){
    var head=cols.map(function(c){ return th(c.label); });
    head.push(th("آخر تحديث"));
    if(hasActions) head.push(th("الإجراءات"));
    tbl.appendChild(el("thead",[el("tr",head)]));
    records.forEach(function(r){
      var data=r.data||{};
      var cells=cols.map(function(c){
        var v=c.get(data);
        return (v&&v.nodeType)?el("td",[v]):el("td",{text:(v==null?"—":String(v))});
      });
      cells.push(el("td",{class:"muted nowrap",text:fmtDate(r.updatedAt)}));
      if(hasActions) cells.push(actionsCell(r));
      tb.appendChild(el("tr",cells));
    });
  } else {
    var ghead=[th("المعرّف المحلي"),th("البيانات"),th("آخر تحديث")];
    if(hasActions) ghead.push(th("الإجراءات"));
    tbl.appendChild(el("thead",[el("tr",ghead)]));
    records.forEach(function(r){
      var gcells=[
        el("td",{class:"mono",text:r.localId||"—"}),
        el("td",[el("div",{class:"mono",style:"max-width:520px;white-space:pre-wrap;word-break:break-word",text:JSON.stringify(r.data||{})})]),
        el("td",{class:"muted nowrap",text:fmtDate(r.updatedAt)})
      ];
      if(hasActions) gcells.push(actionsCell(r));
      tb.appendChild(el("tr",gcells));
    });
  }
  tbl.appendChild(tb); tw.appendChild(tbl);
  return el("div",{class:"card"},[el("div",{class:"card-b flush"},[tw])]);
}

/* Drill-down: from a row of one entity to the related child entity, filtered by
   the parent's id. Subscriber→its receipts, board→its circuits, circuit→its subscribers. */
var SYNC_DRILL={
  subscribers:{label:"الوصولات",entity:"receipts",field:"subscriber_id"},
  boards:{label:"الجوزات",entity:"circuits",field:"board_id"},
  circuits:{label:"المشتركون",entity:"subscribers",field:"circuit_id"}
};

/* Separate full screen for ONE user's synced entity (#/users/:id/data/:entity).
   Server-side SEARCH + PAGINATION + per-row DELETE over the read-only mirror. */
var SYNC_PAGE_LIMIT=25;
function viewUserEntity(id,entity,relField,relValue){
  var cfg=null;
  for(var i=0;i<SYNC_ENTITIES.length;i++){ if(SYNC_ENTITIES[i].value===entity){ cfg=SYNC_ENTITIES[i]; break; } }
  var label=cfg?cfg.label:entity;
  relField=relField||""; relValue=relValue||"";
  var drillCfg=SYNC_DRILL[entity];
  var drill=drillCfg?{
    label:drillCfg.label,
    onClick:function(r){ location.hash="#/users/"+id+"/data/"+drillCfg.entity+"/by/"+drillCfg.field+"/"+encodeURIComponent(r.localId); }
  }:null;
  // Subscribers: drill action opens the per-subscriber statement (info + receipts).
  if(entity==="subscribers"){
    drill={label:"كشف الحساب",onClick:function(r){ location.hash="#/users/"+id+"/sub/"+encodeURIComponent(r.localId); }};
  }
  // Receipts: drill action opens the single-receipt details screen.
  if(entity==="receipts"){
    drill={label:"التفاصيل",onClick:function(r){ location.hash="#/users/"+id+"/data/receipts/detail/"+encodeURIComponent(r.localId); }};
  }

  // Screen-local state (persists across in-screen reloads; resets when the
  // search query changes back to page 1).
  var query="";
  var page=1;
  var user={};

  // Stable DOM regions we repaint without rebuilding the whole screen.
  var headWrap=el("div");        // pageHead (title + count)
  var tableWrap=el("div");       // table card
  var pagerWrap=el("div");       // pagination controls
  var searchIn=el("input",{class:"input",type:"text",placeholder:"ابحث في "+label+"…",value:""});

  function crumb(){
    return el("div",{class:"crumb"},[
      el("a",{href:"#/users",text:"المستخدمون"}),el("span",{text:" / "}),
      el("a",{href:"#/users/"+id,text:(user.name||user.username||"مستخدم")}),
      el("span",{text:" / "+label+(relField?" (مُصفّى)":"")})
    ]);
  }

  function buildShell(){
    var content=el("div");
    content.appendChild(crumb());
    content.appendChild(headWrap);
    var toolbarKids=[
      el("div",{class:"search"},[el("span",{class:"ic",text:"🔍"}),searchIn]),
      el("div",{class:"grow"})
    ];
    if(relField){
      toolbarKids.push(el("a",{class:"btn neutral sm",href:"#/users/"+id+"/data/"+entity},["كل "+label+" ›"]));
    }
    toolbarKids.push(el("button",{class:"btn ghost",onclick:function(){ load(); }},["تحديث"]));
    content.appendChild(el("div",{class:"toolbar"},toolbarKids));
    content.appendChild(tableWrap);
    content.appendChild(pagerWrap);
    shell("#/users",content);
  }

  function paintHead(total){
    clear(headWrap);
    headWrap.appendChild(el("div",{class:"page-head"},[el("h1",{text:label+" ("+(total!=null?total:0)+")"})]));
  }

  function paintPager(total){
    clear(pagerWrap);
    var pages=Math.max(1,Math.ceil((total||0)/SYNC_PAGE_LIMIT));
    if(!total) return;
    pagerWrap.appendChild(el("div",{class:"toolbar",style:"justify-content:center;margin-top:6px"},[
      el("button",{class:"btn neutral sm",disabled:page<=1?"":false,onclick:function(){ if(page>1){ page--; load(); } }},["السابق ›"]),
      el("span",{class:"muted",style:"min-width:120px;text-align:center",text:"صفحة "+page+" / "+pages}),
      el("button",{class:"btn neutral sm",disabled:page>=pages?"":false,onclick:function(){ if(page<pages){ page++; load(); } }},["‹ التالي"])
    ]));
  }

  function doDelete(r){
    confirmModal({
      title:"حذف السجل", danger:true, confirmText:"حذف",
      alert:"هذا يحذف السجل من النسخة المتزامنة فقط (نسخة للقراءة فقط).", alertType:"err",
      message:"حذف هذا السجل من ("+label+") — <code>"+esc(r.localId||"")+"</code>؟",
      onConfirm:function(){
        return API.deleteUserData(id,entity,r.localId).then(function(){
          toast("تم حذف السجل","ok");
          load();
        });
      }
    });
  }

  function load(){
    clear(tableWrap); tableWrap.appendChild(loadingBlock("جارٍ التحميل…"));
    clear(pagerWrap);
    API.userData(id,entity,{q:query,page:page,limit:SYNC_PAGE_LIMIT,relField:relField,relValue:relValue}).then(function(res){
      var records=normalizeList(res,"records");
      var total=(res&&typeof res.total==="number")?res.total:records.length;
      if(res&&res.page) page=res.page;
      // If a delete emptied the last page, step back and refetch.
      if(!records.length && total>0 && page>1){ page--; load(); return; }
      paintHead(total);
      paintPager(total);
      clear(tableWrap);
      tableWrap.appendChild(renderSyncTable(entity,records,doDelete,drill));
    }).catch(function(err){
      if(err.status===401) return;
      clear(tableWrap); tableWrap.appendChild(errorBlock(err,load));
    });
  }

  // debounced search -> reset to page 1
  var debTimer=null;
  searchIn.addEventListener("input",function(){
    if(debTimer) clearTimeout(debTimer);
    debTimer=setTimeout(function(){
      query=searchIn.value.trim();
      page=1;
      load();
    },300);
  });

  // Initial render: build shell with a loading placeholder, fetch the user for
  // the breadcrumb, then load the first page of records.
  paintHead(0);
  buildShell();
  clear(tableWrap); tableWrap.appendChild(loadingBlock("جارٍ التحميل…"));
  API.user(id).then(function(res){
    user=(res&&res.user)||res||{};
    buildShell();   // re-render crumb with the real user name
  }).catch(function(){ /* keep placeholder crumb */ })
    .then(function(){ load(); });
}

/* Single receipt details (#/users/:id/data/receipts/detail/:localId). */
function viewReceiptDetail(id,localId){
  shell("#/users",loadingBlock("جارٍ التحميل…"));
  Promise.all([
    API.user(id).catch(function(){ return {user:{}}; }),
    API.userData(id,"receipts",{localId:localId})
  ]).then(function(res){
    var u=(res[0]&&res[0].user)||res[0]||{};
    var rec=normalizeList(res[1],"records")[0];
    if(!rec){
      var nf=el("div");
      nf.appendChild(el("div",{class:"crumb"},[
        el("a",{href:"#/users",text:"المستخدمون"}),el("span",{text:" / "}),
        el("a",{href:"#/users/"+id+"/data/receipts",text:"الوصولات"}),el("span",{text:" / غير موجود"})
      ]));
      nf.appendChild(pageHead("وصل"));
      nf.appendChild(el("div",{class:"card"},[el("div",{class:"card-b"},[
        el("div",{class:"empty"},[el("div",{class:"big",text:"🧾"}),"الوصل غير موجود في النسخة المتزامنة."])
      ])]));
      shell("#/users",nf);
      return;
    }
    var d=rec.data||{};
    // Resolve the subscriber name (best-effort) then render.
    var pSub=d.subscriber_id?API.userData(id,"subscribers",{localId:d.subscriber_id}):Promise.resolve(null);

/* Shared receipt-detail body (page head + details card) — admin + owner screens. */
function receiptDetailContent(rec,d,subName){
  var content=el("div");
  content.appendChild(pageHead("وصل رقم #"+(d.receipt_no!=null?d.receipt_no:"—")));

  var status=(d.status||"valid");
  var badge=el("span",{class:"badge "+(status==="valid"?"green":"red")},[status==="valid"?"صالح":status]);
  if(d.deleted||rec.deleted){ badge=el("span",{class:"badge gray"},["محذوف"]); }

  var kv=[];
  function row(k,v){
    kv.push(el("div",{class:"k",text:k}));
    if(v&&v.nodeType) kv.push(el("div",{class:"v"},[v]));
    else kv.push(el("div",{class:"v",text:(v==null||v==="")?"—":String(v)}));
  }
  row("رقم الوصل", d.receipt_no);
  row("الحالة", badge);
  row("المشترك", subName||d.subscriber_id||"—");
  row("الشهر", d.month);
  row("الأمبيرات", d.amps_snapshot);
  row("سعر الأمبير", d.price_snapshot!=null?fmtPrice(d.price_snapshot):"—");
  row("المدفوع", d.paid_amount!=null?fmtPrice(d.paid_amount):"—");
  row("المتبقي بعد الدفع", d.remaining_after!=null?fmtPrice(d.remaining_after):"—");
  row("تاريخ الإصدار", d.issued_at?fmtDate(d.issued_at):"—");
  row("تاريخ المزامنة", fmtDate(rec.updatedAt));
  row("معرّف الوصل", rec.localId);

  content.appendChild(el("div",{class:"card"},[
    el("div",{class:"card-h"},[el("span",{text:"تفاصيل الوصل"})]),
    el("div",{class:"card-b"},[el("div",{class:"kv"},kv)])
  ]));
  return content;
}

/* ============================================================
   Subscriber statement (#/users/:id/sub/:subId)
   Header card with the subscriber's info + a paginated payment-history
   statement of their receipts. Reuses the receipts mirror endpoint filtered
   by subscriber_id; each receipt row links to the receipt-details screen.
   ============================================================ */
function viewUserStatement(id,subId){
  var query="";          // not searched here, kept for endpoint shape
  var page=1;
  var user={};
  var sub=null;          // subscriber record data

  var headWrap=el("div");   // crumb + page head
  var infoWrap=el("div");   // subscriber info card
  var tableWrap=el("div");  // statement table card
  var pagerWrap=el("div");  // pagination controls

  function crumb(){
    return el("div",{class:"crumb"},[
      el("a",{href:"#/users",text:"المستخدمون"}),el("span",{text:" / "}),
      el("a",{href:"#/users/"+id,text:(user.name||user.username||"مستخدم")}),el("span",{text:" / "}),
      el("a",{href:"#/users/"+id+"/data/subscribers",text:"المشتركون"}),
      el("span",{text:" / "+((sub&&sub.name)||"كشف الحساب")})
    ]);
  }

  function buildShell(){
    var content=el("div");
    content.appendChild(headWrap);
    content.appendChild(infoWrap);
    content.appendChild(tableWrap);
    content.appendChild(pagerWrap);
    shell("#/users",content);
  }

  function paintHead(){
    clear(headWrap);
    headWrap.appendChild(crumb());
    headWrap.appendChild(pageHead("كشف حساب: "+((sub&&sub.name)||"مشترك"),[
      el("a",{class:"btn neutral",href:"#/users/"+id+"/data/subscribers"},["كل المشتركين ›"]),
      el("button",{class:"btn ghost",onclick:function(){ loadReceipts(); }},["تحديث"])
    ]));
  }

  function paintInfo(){
    clear(infoWrap);
    var s=sub||{};
    infoWrap.appendChild(el("div",{class:"card"},[
      el("div",{class:"card-h"},[el("span",{text:"بيانات المشترك"})]),
      el("div",{class:"card-b"},[el("div",{class:"kv"},[
        kv("الاسم",s.name||"—"),
        kv("الهاتف",s.phone||"—"),
        kv("الأمبيرات",s.amps!=null?String(s.amps):"—"),
        kv("اللوحة",s.board_id||"—"),
        kv("الجوزة",s.circuit_id||"—"),
        kvNode("الحالة", (s.status==="inactive"||s.active===false)
          ? el("span",{class:"badge gray"},[el("span",{class:"dot"}),"غير نشط"])
          : el("span",{class:"badge green"},[el("span",{class:"dot"}),"نشط"]))
      ])])
    ]));
  }

  function paintPager(total){
    clear(pagerWrap);
    var pages=Math.max(1,Math.ceil((total||0)/SYNC_PAGE_LIMIT));
    if(!total) return;
    pagerWrap.appendChild(el("div",{class:"toolbar",style:"justify-content:center;margin-top:6px"},[
      el("button",{class:"btn neutral sm",disabled:page<=1?"":false,onclick:function(){ if(page>1){ page--; loadReceipts(); } }},["السابق ›"]),
      el("span",{class:"muted",style:"min-width:120px;text-align:center",text:"صفحة "+page+" / "+pages}),
      el("button",{class:"btn neutral sm",disabled:page>=pages?"":false,onclick:function(){ if(page<pages){ page++; loadReceipts(); } }},["‹ التالي"])
    ]));
  }

  function loadReceipts(){
    clear(tableWrap); tableWrap.appendChild(loadingBlock("جارٍ التحميل…"));
    clear(pagerWrap);
    API.userData(id,"receipts",{q:query,page:page,limit:SYNC_PAGE_LIMIT,relField:"subscriber_id",relValue:subId}).then(function(res){
      var records=normalizeList(res,"records");
      var total=(res&&typeof res.total==="number")?res.total:records.length;
      if(res&&res.page) page=res.page;
      paintPager(total);
      clear(tableWrap);
      tableWrap.appendChild(statementTable(records,function(lid){ return "#/users/"+id+"/data/receipts/detail/"+encodeURIComponent(lid); }));
    }).catch(function(err){
      if(err.status===401) return;
      clear(tableWrap); tableWrap.appendChild(errorBlock(err,loadReceipts));
    });
  }

  // Initial render: placeholder shell, then fetch user + subscriber, then receipts.
  paintHead();
  paintInfo();
  buildShell();
  clear(tableWrap); tableWrap.appendChild(loadingBlock("جارٍ التحميل…"));
  Promise.all([
    API.user(id).catch(function(){ return {user:{}}; }),
    API.userData(id,"subscribers",{localId:subId}).catch(function(){ return {records:[]}; })
  ]).then(function(res){
    user=(res[0]&&res[0].user)||res[0]||{};
    var sr=normalizeList(res[1],"records")[0];
    sub=sr?(sr.data||{}):{};
    paintHead();
    paintInfo();
    buildShell();
    loadReceipts();
  }).catch(function(err){
    if(err.status===401) return;
    clear(tableWrap); tableWrap.appendChild(errorBlock(err,function(){ viewUserStatement(id,subId); }));
  });
}

/* Shared statement table (receipt rows). `detailHref(localId)` builds the link
   to the receipt-details screen (admin or owner scope). */
function statementTable(records,detailHrefFor){
  if(!records.length){
    return el("div",{class:"card"},[el("div",{class:"card-b"},[
      el("div",{class:"empty"},[el("div",{class:"big",text:"🧾"}),"لا توجد وصولات لهذا المشترك بعد."])
    ])]);
  }
  var tw=el("div",{class:"tbl-wrap"});
  var tbl=el("table");
  tbl.appendChild(el("thead",[el("tr",[
    th("رقم الوصل"),th("الشهر"),th("المدفوع"),th("المتبقي"),th("التاريخ"),th("الحالة"),th("")
  ])]));
  var tb=el("tbody");
  records.forEach(function(r){
    var d=r.data||{};
    var st=(d.deleted||r.deleted)?"deleted":(d.status||"valid");
    var stBadge=st==="deleted"
      ? el("span",{class:"badge gray"},["محذوف"])
      : el("span",{class:"badge "+(st==="valid"?"green":"red")},[st==="valid"?"صالح":st]);
    var detailHref=detailHrefFor(r.localId);
    tb.appendChild(el("tr",[
      el("td",[el("a",{href:detailHref,style:"font-weight:700",text:(d.receipt_no!=null?"#"+d.receipt_no:"—")})]),
      el("td",{class:"nowrap",text:syncText(d.month)}),
      el("td",{class:"nowrap",text:d.paid_amount!=null?fmtPrice(d.paid_amount):"—"}),
      el("td",{class:"nowrap",text:d.remaining_after!=null?fmtPrice(d.remaining_after):"—"}),
      el("td",{class:"muted nowrap",text:d.issued_at?fmtDateShort(d.issued_at):fmtDateShort(r.updatedAt)}),
      el("td",[stBadge]),
      el("td",{class:"right"},[el("a",{class:"btn sm ghost",href:detailHref},["التفاصيل ›"])])
    ]));
  });
  tbl.appendChild(tb); tw.appendChild(tbl);
  return el("div",{class:"card"},[
    el("div",{class:"card-h"},[el("span",{text:"سجل المدفوعات"})]),
    el("div",{class:"card-b flush"},[tw])
  ]);
}

        class:"stat",

      },[

        el("div",{class:"lbl",text:e.label}),

    });

      kv("اسم المستخدم / الهاتف",me.username||me.phone||"—"),
      kvNode("الخطة",sub.planCode?planChip(sub.planCode):el("span",{class:"muted",text:"لا يوجد"})),
      kvNode("حالة الاشتراك",statusBadge(sub.status||"none")),
      kv("تاريخ الانتهاء",fmtDateShort(sub.expiresAt))
    ])]));
    content.appendChild(acc);

    // Latest data uploaded (synced) from this owner's app — newest first, paginated.
    content.appendChild(recentUploadsCard(API.myRecent,{
      targetFor:function(it){
        if(it.entity==="receipts") return "#/my/data/receipts/detail/"+encodeURIComponent(it.localId);
        if(it.entity==="subscribers") return "#/my/sub/"+encodeURIComponent(it.localId);
        return "#/my/data/"+it.entity;
      }
    }));

    shell("#/my",content);
  }).catch(function(err){
    if(err.status===401) return;
    shell("#/my",errorBlock(err,viewMyDashboard));
  });
}

/* Owner entity screen (#/my/data/:entity[/by/:relField/:relValue]).
   Same search + pagination UX as the admin screen, but read-only. */
function viewMyEntity(entity,relField,relValue){
  var label=ownerEntityLabel(entity);
  relField=relField||""; relValue=relValue||"";
  var drillCfg=SYNC_DRILL[entity];
  var drill=drillCfg?{
    label:drillCfg.label,
    onClick:function(r){ location.hash="#/my/data/"+drillCfg.entity+"/by/"+drillCfg.field+"/"+encodeURIComponent(r.localId); }
  }:null;
  // Subscribers: drill action opens the per-subscriber statement.
  if(entity==="subscribers"){
    drill={label:"كشف الحساب",onClick:function(r){ location.hash="#/my/sub/"+encodeURIComponent(r.localId); }};
  }
  // Receipts: drill action opens the single-receipt details screen.
  if(entity==="receipts"){
    drill={label:"التفاصيل",onClick:function(r){ location.hash="#/my/data/receipts/detail/"+encodeURIComponent(r.localId); }};
  }

  var query="";
  var page=1;

  var headWrap=el("div");
  var tableWrap=el("div");
  var pagerWrap=el("div");
  var searchIn=el("input",{class:"input",type:"text",placeholder:"ابحث في "+label+"…",value:""});

  function crumb(){
    return el("div",{class:"crumb"},[
      el("a",{href:"#/my",text:"لوحتي"}),
      el("span",{text:" / "+label+(relField?" (مُصفّى)":"")})
    ]);
  }

  function buildShell(){
    var content=el("div");
    content.appendChild(crumb());
    content.appendChild(headWrap);
    var toolbarKids=[
      el("div",{class:"search"},[el("span",{class:"ic",text:"🔍"}),searchIn]),
      el("div",{class:"grow"})
    ];
    if(relField){
      toolbarKids.push(el("a",{class:"btn neutral sm",href:"#/my/data/"+entity},["كل "+label+" ›"]));
    }
    toolbarKids.push(el("button",{class:"btn ghost",onclick:function(){ load(); }},["تحديث"]));
    content.appendChild(el("div",{class:"toolbar"},toolbarKids));
    content.appendChild(tableWrap);
    content.appendChild(pagerWrap);
    shell("#/my/data/"+entity,content);
  }

  function paintHead(total){
    clear(headWrap);
    headWrap.appendChild(el("div",{class:"page-head"},[el("h1",{text:label+" ("+(total!=null?total:0)+")"})]));
  }

  function paintPager(total){
    clear(pagerWrap);
    var pages=Math.max(1,Math.ceil((total||0)/SYNC_PAGE_LIMIT));
    if(!total) return;
    pagerWrap.appendChild(el("div",{class:"toolbar",style:"justify-content:center;margin-top:6px"},[
      el("button",{class:"btn neutral sm",disabled:page<=1?"":false,onclick:function(){ if(page>1){ page--; load(); } }},["السابق ›"]),
      el("span",{class:"muted",style:"min-width:120px;text-align:center",text:"صفحة "+page+" / "+pages}),
      el("button",{class:"btn neutral sm",disabled:page>=pages?"":false,onclick:function(){ if(page<pages){ page++; load(); } }},["‹ التالي"])
    ]));
  }

  function load(){
    clear(tableWrap); tableWrap.appendChild(loadingBlock("جارٍ التحميل…"));
    clear(pagerWrap);
    API.myData(entity,{q:query,page:page,limit:SYNC_PAGE_LIMIT,relField:relField,relValue:relValue}).then(function(res){
      var records=normalizeList(res,"records");
      var total=(res&&typeof res.total==="number")?res.total:records.length;
      if(res&&res.page) page=res.page;
      paintHead(total);
      paintPager(total);
      clear(tableWrap);
      // Read-only: no onDelete → renderSyncTable shows no delete buttons.
      tableWrap.appendChild(renderSyncTable(entity,records,null,drill));
    }).catch(function(err){
      if(err.status===401) return;
      clear(tableWrap); tableWrap.appendChild(errorBlock(err,load));
    });
  }

  // debounced search -> reset to page 1
  var debTimer=null;
  searchIn.addEventListener("input",function(){
    if(debTimer) clearTimeout(debTimer);
    debTimer=setTimeout(function(){
      query=searchIn.value.trim();
      page=1;
      load();
    },300);
  });

  paintHead(0);
  buildShell();
  load();
}

    }).catch(function(){ renderMyReceiptDetail(rec,d,null); });
  }).catch(function(err){
    if(err.status===401) return;
    shell("#/my/data/receipts",errorBlock(err,function(){ viewMyReceiptDetail(localId); }));
  });
}
function renderMyReceiptDetail(rec,d,subName){
  var content=el("div");
  content.appendChild(el("div",{class:"crumb"},[
    el("a",{href:"#/my",text:"لوحتي"}),el("span",{text:" / "}),
    el("a",{href:"#/my/data/receipts",text:"الوصولات"}),
    el("span",{text:" / #"+(d.receipt_no!=null?d.receipt_no:"")})
  ]));
  content.appendChild(receiptDetailContent(rec,d,subName));
  shell("#/my/data/receipts",content);
}

/* Set-plan modal (loads plans for the dropdown) */
function setPlanModal(u,onDone){
  var sub=u.subscription||{};
  var planSel=el("select",{class:"input"},[el("option",{value:"",text:"جارٍ تحميل الخطط…"})]);
  var statusSel=el("select",{class:"input"},[
    optEl("active","نشط"),optEl("pending","قيد الانتظار"),optEl("expired","منتهٍ"),optEl("rejected","مرفوض"),optEl("none","لا يوجد")
  ]);
  statusSel.value=sub.status&&sub.status!=="none"?(["active","pending","expired","rejected","none"].indexOf(sub.status)>=0?sub.status:"active"):"active";
  var errBox=el("div");
  var saveBtn=el("button",{class:"btn",text:"حفظ",onclick:function(){
    var code=planSel.value;
    if(!code){ clear(errBox); errBox.appendChild(el("div",{class:"alert err",text:"اختر خطة."})); return; }
    saveBtn.disabled=true; clear(saveBtn); saveBtn.appendChild(el("span",{class:"spin white"}));
    API.setPlan(u.id,code,statusSel.value).then(function(){
      toast("تم تحديث الخطة","ok"); closeModal(); if(onDone) onDone();
    }).catch(function(err){
      saveBtn.disabled=false; clear(saveBtn); saveBtn.textContent="حفظ";
      clear(errBox); errBox.appendChild(el("div",{class:"alert err",text:err.message}));
    });
  }});

  modal({
    title:"تعيين خطة",
    body:el("div",[
      errBox,
      el("div",{class:"field"},[el("label",{text:"الخطة"}),planSel]),
      el("div",{class:"field"},[el("label",{text:"الحالة"}),statusSel])
    ]),
    footer:[el("button",{class:"btn neutral",text:"إلغاء",onclick:closeModal}),saveBtn]
  });

  API.plans().then(function(res){
    var plans=normalizeList(res,"plans");
    clear(planSel);
    if(!plans.length){ planSel.appendChild(el("option",{value:"",text:"لا توجد خطط متاحة"})); return; }
    plans.forEach(function(p){
      planSel.appendChild(el("option",{value:p.code,text:p.name?(p.name+" ("+p.code+")"):p.code}));
    });
    if(sub.planCode) planSel.value=sub.planCode;
  }).catch(function(err){
    clear(planSel); planSel.appendChild(el("option",{value:"",text:"تعذّر تحميل الخطط"}));
    clear(errBox); errBox.appendChild(el("div",{class:"alert err",text:err.message}));
  });
}

/* ============================================================
   Create user modal
   ============================================================ */
function openCreateUser(onDone){
  var name=el("input",{class:"input",type:"text",placeholder:"اسم المالك"});
  var username=el("input",{class:"input",type:"text",placeholder:"اسم مستخدم فريد",autocomplete:"off"});
  var phone=el("input",{class:"input",type:"text",placeholder:"اختياري"});
  var pass=el("input",{class:"input",type:"password",placeholder:"كلمة المرور",autocomplete:"new-password"});
  var roleSel=el("select",{class:"input"},[optEl("owner","مالك"),optEl("admin","مدير")]);
  var errBox=el("div");
  var saveBtn=el("button",{class:"btn",text:"إنشاء",onclick:function(){
    clear(errBox);
    var body={
      name:name.value.trim(), username:username.value.trim(),

    };

    }
    saveBtn.disabled=true; clear(saveBtn); saveBtn.appendChild(el("span",{class:"spin white"}));
    API.createUser(body).then(function(){
      toast("تم إنشاء المستخدم","ok"); closeModal(); if(onDone) onDone();
    }).catch(function(err){
      saveBtn.disabled=false; clear(saveBtn); saveBtn.textContent="إنشاء";
      errBox.appendChild(el("div",{class:"alert err",text:err.message}));
    });
  }});
  modal({
    title:"إنشاء مستخدم", wide:true,
    body:el("div",[
      errBox,
      el("div",{class:"row"},[
        el("div",{class:"field"},[el("label",{text:"الاسم"}),name]),
        el("div",{class:"field"},[el("label",{text:"اسم المستخدم"}),username])
      ]),
      el("div",{class:"row"},[
        el("div",{class:"field"},[el("label",{text:"الهاتف"}),phone]),
        el("div",{class:"field"},[el("label",{text:"الدور"}),roleSel])
      ]),
      el("div",{class:"field"},[el("label",{text:"كلمة المرور"}),pass])
    ]),
    footer:[el("button",{class:"btn neutral",text:"إلغاء",onclick:closeModal}),saveBtn]
  });
}

/* ============================================================
   View: Plans
   ============================================================ */
function viewPlans(){
  shell("#/plans",loadingBlock("جارٍ تحميل الخطط…"));
  API.plans().then(function(res){
    var plans=normalizeList(res,"plans");
    renderPlans(plans);
  }).catch(function(err){
    if(err.status===401) return;
    shell("#/plans",errorBlock(err,viewPlans));
  });

  function renderPlans(plans){
    var content=el("div");
    content.appendChild(pageHead("الخطط",[
      el("button",{class:"btn",onclick:function(){ openPlanModal(null,viewPlans); }},["+ خطة جديدة"])
    ]));

    var card=el("div",{class:"card"});
    var b=el("div",{class:"card-b flush"});
    if(!plans.length){
      b.className="card-b";
      b.appendChild(el("div",{class:"empty"},[el("div",{class:"big",text:"📦"}),"لا توجد خطط بعد. أنشئ خطتك الأولى."]));
    } else {
      var tw=el("div",{class:"tbl-wrap"});
      var tbl=el("table");
      tbl.appendChild(el("thead",[el("tr",[th("الرمز"),th("الاسم"),th("المدة"),th("أقصى عدد أجهزة"),th("السعر"),th("نشطة"),th("")])]));
      var tb=el("tbody");
      plans.forEach(function(p){
        tb.appendChild(el("tr",[
          el("td",[el("span",{class:"badge blue",text:p.code})]),
          el("td",{style:"font-weight:700"},[p.name||"—"]),
          el("td",{class:"muted",text:(p.durationDays!=null?p.durationDays+" يوم":"—")}),
          el("td",{class:"muted",text:(p.maxDevices!=null?String(p.maxDevices):"—")}),
          el("td",{class:"muted nowrap",text:fmtPrice(p.price)}),
          el("td",[p.active!==false?el("span",{class:"badge green",text:"نشطة"}):el("span",{class:"badge gray",text:"غير نشطة"})]),
          el("td",{class:"right"},[el("div",{class:"acts",style:"justify-content:flex-end"},[
            el("button",{class:"btn sm ghost",onclick:function(){ openPlanModal(p,viewPlans); }},["تعديل"]),
            el("button",{class:"btn sm danger ghost",onclick:function(){ deletePlan(p); }},["حذف"])
          ])])
        ]));
      });
      tbl.appendChild(tb); tw.appendChild(tbl); b.appendChild(tw);
    }
    card.appendChild(b);
    content.appendChild(card);
    shell("#/plans",content);
  }

  function deletePlan(p){
    confirmModal({
      title:"حذف الخطة", danger:true, confirmText:"حذف",
      message:"حذف الخطة <b>"+esc(p.name||p.code)+"</b> (<code>"+esc(p.code)+"</code>)؟",
      onConfirm:function(){ return API.deletePlan(p.code).then(function(){ toast("تم حذف الخطة","ok"); viewPlans(); }); }
    });
  }
}

function openPlanModal(existing,onDone){
  var isEdit=!!existing;
  var p=existing||{};
  var code=el("input",{class:"input",type:"text",placeholder:"مثال: monthly",value:p.code||""});
  if(isEdit){ code.disabled=true; code.style.background="#f4f6fa"; }
  var name=el("input",{class:"input",type:"text",placeholder:"مثال: شهري",value:p.name||""});
  var duration=el("input",{class:"input",type:"number",min:"0",placeholder:"30",value:(p.durationDays!=null?p.durationDays:"")});
  var maxDev=el("input",{class:"input",type:"number",min:"1",placeholder:"1",value:(p.maxDevices!=null?p.maxDevices:"")});
  var price=el("input",{class:"input",type:"number",min:"0",placeholder:"0",value:(p.price!=null?p.price:"")});
  var desc=el("textarea",{class:"input",placeholder:"وصف اختياري"});
  desc.value=p.description||"";
  var activeChk=el("input",{type:"checkbox"});
  activeChk.checked=p.active!==false;
  var errBox=el("div");

  var saveBtn=el("button",{class:"btn",text:isEdit?"حفظ التغييرات":"إنشاء خطة",onclick:function(){
    clear(errBox);
    var body={
      code:(code.value||"").trim(),
      name:(name.value||"").trim(),
      durationDays:duration.value!==""?Number(duration.value):0,
      maxDevices:maxDev.value!==""?Number(maxDev.value):1,
      price:price.value!==""?Number(price.value):0,
      description:(desc.value||"").trim(),
      active:activeChk.checked
    };
    if(!body.code){ errBox.appendChild(el("div",{class:"alert err",text:"الرمز مطلوب."})); return; }
    if(!body.name){ errBox.appendChild(el("div",{class:"alert err",text:"الاسم مطلوب."})); return; }
    saveBtn.disabled=true; clear(saveBtn); saveBtn.appendChild(el("span",{class:"spin white"}));
    API.upsertPlan(body).then(function(){
      toast(isEdit?"تم تحديث الخطة":"تم إنشاء الخطة","ok"); closeModal(); if(onDone) onDone();
    }).catch(function(err){
      saveBtn.disabled=false; clear(saveBtn); saveBtn.textContent=isEdit?"حفظ التغييرات":"إنشاء خطة";
      errBox.appendChild(el("div",{class:"alert err",text:err.message}));
    });
  }});

  modal({
    title:isEdit?("تعديل الخطة: "+(p.code||"")):"خطة جديدة", wide:true,
    body:el("div",[
      errBox,
      el("div",{class:"row"},[
        el("div",{class:"field"},[el("label",{text:"الرمز"+(isEdit?" (مقفل)":"")}),code]),
        el("div",{class:"field"},[el("label",{text:"الاسم"}),name])
      ]),
      el("div",{class:"row"},[
        el("div",{class:"field"},[el("label",{text:"المدة (أيام)"}),duration]),
        el("div",{class:"field"},[el("label",{text:"أقصى عدد أجهزة"}),maxDev]),
        el("div",{class:"field"},[el("label",{text:"السعر (د.ع)"}),price])
      ]),
      el("div",{class:"field"},[el("label",{text:"الوصف"}),desc]),
      el("div",{class:"field"},[el("label",{class:"check"},[activeChk,el("span",{text:"نشطة (مرئية للمستخدمين)"})])])
    ]),
    footer:[el("button",{class:"btn neutral",text:"إلغاء",onclick:closeModal}),saveBtn]
  });
}

/* ============================================================
   Shared: error / list helpers
   ============================================================ */
function errorBlock(err,retry){
  var content=el("div");
  content.appendChild(pageHead("حدث خطأ ما"));
  content.appendChild(el("div",{class:"card"},[el("div",{class:"card-b"},[
    el("div",{class:"alert err",text:err.message||"خطأ غير متوقع."}),
    retry?el("button",{class:"btn ghost",onclick:retry},["إعادة المحاولة"]):null
  ])]));
  return content;
}
function normalizeList(res,key){
  if(!res) return [];
  if(Array.isArray(res)) return res;
  if(Array.isArray(res[key])) return res[key];
  if(Array.isArray(res.data)) return res.data;
  return [];
}

/* ============================================================
   Public receipt verification (#/r/:uuid) — renders WITHOUT login.
   Standalone Arabic card; no sidebar/nav. Fetches the public endpoint.
   ============================================================ */
function viewPublicReceipt(uuid){
  var app=$("#app"); clear(app);
  var screen=el("div",{class:"receipt-screen"});
  var card=el("div",{class:"receipt-card"});
  card.appendChild(el("div",{class:"r-body",style:"padding:48px 22px"},[loadingBlock("جارٍ التحقق من الوصل…")]));
  screen.appendChild(card);
  app.appendChild(screen);

  API.publicReceipt(uuid).then(function(res){
    clear(card);
    var found=res&&res.found&&res.receipt;
    var genName=(res&&res.generatorName)||"المولّدة";
    card.appendChild(el("div",{class:"r-head"},[
      el("h1",{class:"gen",text:genName}),
      el("p",{class:"tag",text:found?"وصل استلام":"التحقق من الوصل"})
    ]));

    if(!found){
      card.appendChild(el("div",{class:"r-empty"},[
        el("div",{class:"big",text:"🧾"}),
        el("div",{style:"font-weight:700;font-size:16px;color:var(--text)",text:"غير موجود"}),
        el("div",{style:"margin-top:6px",text:"تعذّر العثور على هذا الوصل."})
      ]));
      return;
    }

    var r=res.receipt;
    var status=(r.status||"valid");
    var stBadge=el("span",{class:"badge "+(status==="valid"?"green":(status==="deleted"?"gray":"red"))},[
      status==="valid"?"صالح":(status==="deleted"?"محذوف":status)
    ]);

    card.appendChild(el("div",{class:"r-no",text:"وصل استلام رقم #"+(r.receipt_no!=null?r.receipt_no:"—")}));

    var body=el("div",{class:"r-body"});
    function line(k,v){
      body.appendChild(el("div",{class:"r-line"},[
        el("span",{class:"k",text:k}),
        (v&&v.nodeType)?el("span",{class:"v"},[v]):el("span",{class:"v",text:(v==null||v==="")?"—":String(v)})
      ]));
    }
    line("المشترك", (res.subscriberName||"—"));
    line("الشهر", r.month);
    line("الأمبيرات", r.amps_snapshot);
    line("سعر الأمبير", r.price_snapshot!=null?fmtPrice(r.price_snapshot):"—");
    line("المدفوع", r.paid_amount!=null?fmtPrice(r.paid_amount):"—");
    line("المتبقي", r.remaining_after!=null?fmtPrice(r.remaining_after):"—");
    line("التاريخ", r.issued_at?fmtDate(r.issued_at):"—");
    line("الحالة", stBadge);
    card.appendChild(body);

    // Button → the same subscriber's invoice history (public).
    card.appendChild(el("div",{class:"r-body",style:"padding-top:0"},[
      el("a",{
        class:"btn ghost",
        style:"width:100%;justify-content:center",
        href:"#/r/"+encodeURIComponent(uuid)+"/history"
      },["عرض الفواتير السابقة"])
    ]));
  }).catch(function(err){
    clear(card);
    card.appendChild(el("div",{class:"r-head"},[
      el("h1",{class:"gen",text:"المولّدة"}),
      el("p",{class:"tag",text:"التحقق من الوصل"})
    ]));
    card.appendChild(el("div",{class:"r-empty"},[
      el("div",{class:"big",text:"⚠️"}),
      el("div",{style:"font-weight:700;font-size:16px;color:var(--text)",text:"تعذّر التحقق"}),
      el("div",{style:"margin-top:6px",text:err.message||"حدث خطأ أثناء جلب الوصل."})
    ]));
  });
}

/* Public subscriber invoice history (#/r/:uuid/history) — no login. */
function viewPublicReceiptHistory(uuid){
  var app=$("#app"); clear(app);
  var screen=el("div",{class:"receipt-screen"});
  var card=el("div",{class:"receipt-card"});
  card.appendChild(el("div",{class:"r-body",style:"padding:48px 22px"},[loadingBlock("جارٍ تحميل الفواتير…")]));
  screen.appendChild(card);
  app.appendChild(screen);

  API.publicReceiptHistory(uuid).then(function(res){
    clear(card);
    var genName=(res&&res.generatorName)||"المولّدة";
    card.appendChild(el("div",{class:"r-head"},[
      el("h1",{class:"gen",text:genName}),
      el("p",{class:"tag",text:"الفواتير السابقة"+((res&&res.subscriberName)?(" — "+res.subscriberName):"")})
    ]));

    var recs=(res&&res.receipts)||[];
    if(!res||!res.found||!recs.length){

      ]));

          status==="valid"?"صالح":(status==="deleted"?"محذوف":status)
        ]);
        body.appendChild(el("a",{
          class:"r-line",
          style:"text-decoration:none;cursor:pointer;display:flex;align-items:center;gap:10px",
          href: r.uuid?("#/r/"+encodeURIComponent(r.uuid)):"javascript:void(0)"
        },[
          el("span",{class:"k",style:"min-width:58px",text:"#"+(r.receipt_no!=null?r.receipt_no:"—")}),
          el("span",{class:"v",style:"flex:1",text:(r.month||"—")}),
          el("span",{class:"v",style:"font-weight:700",text:(r.paid_amount!=null?fmtPrice(r.paid_amount):"—")}),

      });
      card.appendChild(body);

    card.appendChild(el("div",{class:"r-body",style:"padding-top:0"},[
      el("a",{class:"btn ghost",style:"width:100%;justify-content:center",href:"#/r/"+encodeURIComponent(uuid)},["‹ رجوع للوصل"])
    ]));
  }).catch(function(err){
    clear(card);
    card.appendChild(el("div",{class:"r-head"},[
      el("h1",{class:"gen",text:"المولّدة"}),
      el("p",{class:"tag",text:"الفواتير السابقة"})
    ]));
    card.appendChild(el("div",{class:"r-empty"},[
      el("div",{class:"big",text:"⚠️"}),
      el("div",{style:"font-weight:700;font-size:16px;color:var(--text)",text:"تعذّر التحميل"}),
      el("div",{style:"margin-top:6px",text:err.message||"حدث خطأ."})
    ]));
  });
}

/* ============================================================
   Boot
   ============================================================ */
function boot(){
  // Validate existing token against /me so a stale token doesn't show a broken UI.
  if(state.token && (!location.hash || location.hash==="#/login")){
    location.hash=homeHash();
  }
  render();
  if(state.token && !currentRouteIsPublic()){
    if(isAdmin()) connectEvents();   // real-time notifications (admin sessions only)
    API.me().then(function(res){
      var acc=(res&&res.account)||res;
      if(acc){
        setSession(state.token,acc);   // owners are allowed; role kept in state.me
        // Re-route if the refreshed role doesn't match the current area.
        if(!currentRouteIsPublic()){
          var ownerArea=/^#\/my(\/|$)/.test(location.hash||"");
          if(isAdmin() && ownerArea) location.hash="#/dashboard";
          else if(!isAdmin() && !ownerArea) location.hash="#/my";
        }
      }
    }).catch(function(){ /* 401 handled inside api() */ });
  }
}
boot();

/* expose a couple of helpers for debugging */
window.__moldatiAdmin={state:state,API:API};
})();
